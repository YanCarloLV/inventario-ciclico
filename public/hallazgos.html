<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Hallazgos Independiente</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #d35400; border-bottom: 2px solid #e67e22; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #e67e22; color: white; }
        .btn-dl { background: #27ae60; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; }
        .tag { background: #fdf2e9; color: #d35400; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📦 Historial de Hallazgos Libres</h1>
        <p>Reportes generados desde la pantalla de captura libre (Estructura Independiente).</p>
        <table id="tablaHallazgos">
            <thead>
                <tr>
                    <th>ID Reporte</th>
                    <th>Operador</th>
                    <th>Fecha/Hora</th>
                    <th>Piezas Totales</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let hallazgosData = [];

    async function cargarHallazgos() {
        const res = await fetch('/api/ciclicos'); // Usamos el mismo endpoint pero filtramos
        const datos = await res.json();
        
        // Filtramos solo los que son Hallazgos
        hallazgosData = datos.filter(c => c.asignadoA && c.asignadoA.includes("(HALLAZGO)"));

        const cuerpo = document.querySelector("#tablaHallazgos tbody");
        cuerpo.innerHTML = "";

        hallazgosData.forEach(h => {
            const totalPiezas = h.resultados.reduce((acc, r) => acc + parseInt(r.cantidad || 0), 0);
            cuerpo.innerHTML += `
                <tr>
                    <td><b>#${h.id}</b></td>
                    <td>${h.asignadoA.replace("(HALLAZGO)", "")}</td>
                    <td>${h.horaFin || 'En curso...'}</td>
                    <td><span class="tag">${totalPiezas} piezas</span></td>
                    <td><button class="btn-dl" onclick="descargarExcelHallazgo(${h.id})">📥 Descargar CSV</button></td>
                </tr>
            `;
        });
    }

    function descargarExcelHallazgo(id) {
        const h = hallazgosData.find(item => item.id === id);
        if(!h) return;

        // Cabecera basada EXACTAMENTE en tu libreta
        // Marca, Tipo, Modelo, Color, Talla, Cantidad
        let csv = "\uFEFFID,Marca,Tipo,Modelo,Color,Talla,Cantidad,Operador,Hora\n";
        
        h.resultados.forEach(r => {
            const marca = (r.marca || "N/A").replace(/,/g, " ");
            const tipo = (r.tipo || "N/A").replace(/,/g, " ");
            const modelo = (r.modelo || "N/A").replace(/,/g, " ");
            const color = (r.color || "N/A").replace(/,/g, " ");
            const operador = h.asignadoA.replace("(HALLAZGO)", "").trim();

            csv += `${h.id},${marca},${tipo},${modelo},${color},${r.talla},${r.cantidad},${operador},${h.horaFin}\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `HALLAZGO_LIBRE_${h.id}.csv`;
        link.click();
    }

    cargarHallazgos();
</script>
</body>
</html>
