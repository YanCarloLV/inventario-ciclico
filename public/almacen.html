<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacén SAP - Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-navy: #001A33; --brand-gold: #C5A059; --brand-orange: #FF8C00;
            --bg-body: #F4F7F6; --text-main: #1C1C1E; --text-muted: #8E8E93;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
            --success: #34C759; --danger: #FF3B30; --info: #007AFF;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-body); margin: 0; padding: 0 0 40px 0; color: var(--text-main); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        .top-header { background: var(--brand-navy); text-align: center; padding: 25px 20px; border-bottom: 4px solid var(--brand-orange); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .logo-wrap { background: white; display: inline-block; padding: 12px 35px; border-radius: 40px; box-shadow: 0 4px 20px rgba(255, 140, 0, 0.3); }
        .logo-wrap img { max-height: 70px; vertical-align: middle; }

        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: var(--card-shadow); margin-bottom: 30px; border: 1px solid rgba(0,0,0,0.03); }
        
        h2 { font-size: 22px; color: var(--brand-navy); margin-top: 0; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        h2::before { content: ""; width: 5px; height: 22px; background: var(--brand-gold); border-radius: 5px; }

        .tabs { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #E5E5EA; padding-bottom: 15px; }
        .tab-btn { background: transparent; border: none; font-size: 16px; font-weight: 800; color: var(--text-muted); padding: 10px 20px; cursor: pointer; transition: 0.3s; border-radius: 12px; }
        .tab-btn.active { background: var(--brand-navy); color: white; box-shadow: 0 5px 15px rgba(0,26,51,0.2); }

        .btn { padding: 12px 24px; border: none; border-radius: 14px; cursor: pointer; font-weight: 800; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; color: white; font-family: inherit; }
        .btn:active { transform: scale(0.96); }
        .btn-green { background: var(--success); }
        .btn-orange { background: var(--brand-orange); }
        .btn-navy { background: var(--brand-navy); }
        .btn-outline { background: #F2F2F7; color: var(--text-main); }
        .btn-purple { background: #5E5CE6; }
        
        .search-box { width: 100%; padding: 16px; border: 2px solid #E5E5EA; border-radius: 14px; font-size: 15px; outline: none; background: #F9F9FB; font-weight: 600; margin-bottom: 20px; box-sizing: border-box; }
        .search-box:focus { border-color: var(--brand-navy); background: white; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; background: white; }
        th { background: white; color: var(--text-muted); text-align: left; padding: 15px; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #E5E5EA; }
        td { padding: 15px; border-bottom: 1px solid #F2F2F7; font-size: 14px; font-weight: 600; color: var(--brand-navy); }
        tbody tr:hover td { background: #F9F9FB; }
        
        .tag { padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .tag-in { background: #E5F9E7; color: #28A745; }
        .tag-out { background: #FFEBEB; color: #FF3B30; }

        /* Modal SAP */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 26, 51, 0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box { background: white; width: 90%; max-width: 600px; padding: 35px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); transform: translateY(30px); transition: 0.3s; max-height: 90vh; overflow-y: auto; }
        .modal-overlay.show .modal-box { transform: translateY(0); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full { grid-column: span 2; }
        label { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .input-sap { padding: 14px; border: 2px solid #E5E5EA; border-radius: 12px; font-size: 15px; font-weight: 600; font-family: inherit; background: #F9F9FB; outline: none; }
        .input-sap:focus { border-color: var(--brand-orange); background: white; }

        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: white; border-left: 5px solid var(--success); padding: 18px 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); font-weight: 700; font-size: 14px; color: var(--brand-navy); animation: slideInRight 0.4s forwards; }
        .toast.danger { border-color: var(--danger); }
        .toast.warning { border-color: var(--brand-orange); }
        @keyframes slideInRight { from { transform: translateX(120%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="top-header">
    <div class="logo-wrap"><img src="/logo.png" alt="Logo Empresa"></div>
</div>

<div class="container">
    <div class="card reveal" style="padding-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('kardex')">📦 Stock Activo (Kardex)</button>
                <button class="tab-btn" onclick="switchTab('historial')">📜 Bitácora de Movimientos</button>
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap;">
                <button class="btn btn-green" onclick="abrirModal('Entrada')">📥 Ingreso Manual</button>
                <button class="btn btn-navy" onclick="abrirModal('Devolución')">🔄 Devolución</button>
                <button class="btn btn-purple" onclick="abrirModalMasivo()">🚀 Carga Masiva (Excel)</button>
            </div>
        </div>
    </div>

    <div id="vista-kardex" class="card reveal" style="animation-delay: 0.1s;">
        <h2>Inventario Disponible por Lotes</h2>
        <input type="text" id="buscarKardex" class="search-box" placeholder="🔍 Buscar por SKU, Modelo, Color o Lote..." onkeyup="filtrarTabla('tablaKardex', this.value)">
        <div style="overflow-x: auto;">
            <table id="tablaKardex">
                <thead><tr><th>Modelo / Color</th><th>Talla</th><th>Lote</th><th>Stock Actual</th><th>Última Act.</th><th>Acciones Rápidas</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="vista-historial" class="card reveal" style="display: none;">
        <h2>Trazabilidad de Movimientos (SAP Log)</h2>
        <input type="text" id="buscarHistorial" class="search-box" placeholder="🔍 Buscar por Folio, Modelo, Responsable o Referencia..." onkeyup="filtrarTabla('tablaHistorial', this.value)">
        <div style="overflow-x: auto;">
            <table id="tablaHistorial">
                <thead><tr><th>Folio</th><th>Fecha</th><th>Tipo</th><th>Producto & Lote</th><th>Cant.</th><th>Referencia</th><th>Responsable</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalSAP">
    <div class="modal-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="modal-title" style="margin:0;">Registrar Movimiento</h2>
            <button class="btn btn-outline" style="padding: 8px 15px;" onclick="cerrarModal('modalSAP')">❌</button>
        </div>
        <div class="form-grid">
            <div class="form-group full"><label>Tipo de Movimiento</label><input type="text" id="md-tipo" class="input-sap" disabled></div>
            <div class="form-group"><label>Modelo</label><input type="text" id="md-modelo" class="input-sap" placeholder="Ej: 4040"></div>
            <div class="form-group"><label>Color</label><input type="text" id="md-color" class="input-sap" placeholder="Ej: NEGRO"></div>
            <div class="form-group"><label>Talla</label><input type="text" id="md-talla" class="input-sap" placeholder="Ej: 38R"></div>
            <div class="form-group"><label>Lote Interno</label><input type="text" id="md-lote" class="input-sap" placeholder="Ej: LOTE-A"></div>
            <div class="form-group"><label>Cantidad</label><input type="number" id="md-cantidad" class="input-sap" min="1"></div>
            <div class="form-group"><label>Responsable</label><input type="text" id="md-responsable" class="input-sap"></div>
            <div class="form-group full"><label>Referencia / Motivo</label><input type="text" id="md-referencia" class="input-sap"></div>
        </div>
        <button class="btn btn-navy" style="width: 100%; padding: 18px; font-size: 16px;" onclick="procesarMovimiento()" id="btn-save-modal">💾 Confirmar Movimiento</button>
    </div>
</div>

<div class="modal-overlay" id="modalMasivo">
    <div class="modal-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0;">🚀 Carga Masiva (Excel/CSV)</h2>
            <button class="btn btn-outline" style="padding: 8px 15px;" onclick="cerrarModal('modalMasivo')">❌</button>
        </div>
        <div class="form-grid">
            <div class="form-group full">
                <label>Archivo Excel/CSV (Columnas: MODELO, COLOR, TALLA, CANTIDAD)</label>
                <input type="file" id="file-masivo" class="input-sap" accept=".xlsx, .csv">
            </div>
            <div class="form-group full">
                <label>Tipo de Operación</label>
                <select id="mas-tipo" class="input-sap">
                    <option value="Entrada Inicial">📥 Entrada Inicial (Base KARDEX)</option>
                    <option value="Entrada Masiva">📥 Entrada Masiva (Proveedores)</option>
                    <option value="Salida Masiva">📤 Salida Masiva (Envíos)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Lote Global Aplicado</label>
                <input type="text" id="mas-lote" class="input-sap" placeholder="Ej: INVENTARIO-BASE">
            </div>
            <div class="form-group">
                <label>Responsable</label>
                <input type="text" id="mas-responsable" class="input-sap">
            </div>
            <div class="form-group full">
                <label>Referencia Global</label>
                <input type="text" id="mas-referencia" class="input-sap" placeholder="Ej: Carga inicial de sistema">
            </div>
        </div>
        <button class="btn btn-purple" style="width: 100%; padding: 18px; font-size: 16px;" onclick="procesarExcelMasivo()" id="btn-save-masivo">⚡ Procesar Excel</button>
    </div>
</div>

<script>
    function showToast(msj, tipo='success'){
        const c = document.getElementById('toast-container'); const t = document.createElement('div');
        t.className = `toast ${tipo}`; t.innerHTML = tipo==='success'?`✅ ${msj}`:`⚠️ ${msj}`;
        c.appendChild(t); setTimeout(()=>t.remove(), 4500);
    }

    function switchTab(tId){
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('vista-kardex').style.display = tId==='kardex'?'block':'none';
        document.getElementById('vista-historial').style.display = tId==='historial'?'block':'none';
    }

    function filtrarTabla(id, texto){
        const filtro = texto.toLowerCase();
        document.querySelectorAll(`#${id} tbody tr`).forEach(r => r.style.display = r.innerText.toLowerCase().includes(filtro)?'':'none');
    }

    async function cargarKardex(){
        const res = await fetch('/api/kardex'); const data = await res.json();
        const tbody = document.querySelector('#tablaKardex tbody'); tbody.innerHTML = '';
        data.forEach(i => tbody.innerHTML += `<tr><td><b>${i.modelo}</b><br><small style="color:var(--text-muted);">${i.color}</small></td><td><b style="color:var(--brand-navy); font-size: 16px;">${i.talla}</b></td><td><span class="tag tag-in" style="background:#F2F2F7; color:#1C1C1E">${i.lote}</span></td><td><span style="font-size: 18px; color: var(--brand-orange); font-weight: 800;">${i.cantidad}</span> pz</td><td><small>${i.ultimaActualizacion||'---'}</small></td><td><button class="btn btn-orange" style="padding:6px 12px; font-size:11px;" onclick="abrirModalSalida('${i.modelo}','${i.color}','${i.talla}','${i.lote}',${i.cantidad})">📤 Salida</button> <button class="btn btn-outline" style="padding:6px 12px; font-size:11px;" onclick="abrirModalAjuste('${i.modelo}','${i.color}','${i.talla}','${i.lote}')">⚖️ Ajuste</button></td></tr>`);
    }

    async function cargarHistorial(){
        const res = await fetch('/api/historial-almacen'); const data = await res.json();
        const tbody = document.querySelector('#tablaHistorial tbody'); tbody.innerHTML = '';
        data.forEach(m => {
            let color = m.tipo.includes('Entrada')?'tag-in':(m.tipo.includes('Salida')?'tag-out':'tag-in');
            tbody.innerHTML += `<tr><td><b>${m.folio}</b></td><td><small>${m.fecha}</small></td><td><span class="tag ${color}">${m.tipo}</span></td><td><b>${m.modelo}</b> (${m.talla})<br><small style="color:var(--text-muted);">Lote: ${m.lote}</small></td><td><b>${m.cantidad}</b></td><td><small>${m.referencia}</small></td><td>${m.responsable}</td></tr>`;
        });
    }

    function abrirModal(tipo){
        document.getElementById('modal-title').innerText = `Registrar ${tipo}`;
        document.getElementById('md-tipo').value = tipo;
        ['md-modelo','md-color','md-talla','md-lote','md-cantidad','md-referencia'].forEach(id => { document.getElementById(id).value = ''; document.getElementById(id).disabled = false; });
        if(localStorage.getItem('almacen_resp')) document.getElementById('md-responsable').value = localStorage.getItem('almacen_resp');
        const m = document.getElementById('modalSAP'); m.style.display = 'flex'; setTimeout(()=>m.classList.add('show'), 10);
    }

    function abrirModalMasivo(){
        if(localStorage.getItem('almacen_resp')) document.getElementById('mas-responsable').value = localStorage.getItem('almacen_resp');
        const m = document.getElementById('modalMasivo'); m.style.display = 'flex'; setTimeout(()=>m.classList.add('show'), 10);
    }

    function abrirModalSalida(m, c, t, l, max){
        abrirModal('Salida');
        document.getElementById('md-modelo').value = m; document.getElementById('md-color').value = c;
        document.getElementById('md-talla').value = t; document.getElementById('md-lote').value = l;
        ['md-modelo','md-color','md-talla','md-lote'].forEach(id => document.getElementById(id).disabled = true);
        document.getElementById('modal-title').innerHTML = `Registrar Salida <br><small style="color:var(--brand-orange)">Stock: ${max} pz</small>`;
    }

    function abrirModalAjuste(m, c, t, l){ abrirModalSalida(m, c, t, l, '---'); document.getElementById('md-tipo').value = "Ajuste Negativo"; document.getElementById('modal-title').innerHTML = `Ajuste de Inventario`; }

    function cerrarModal(id){
        const m = document.getElementById(id); m.classList.remove('show'); setTimeout(()=>m.style.display = 'none', 300);
    }

    async function procesarMovimiento(){
        const data = {
            tipo: document.getElementById('md-tipo').value, modelo: document.getElementById('md-modelo').value.toUpperCase(),
            color: document.getElementById('md-color').value.toUpperCase(), talla: document.getElementById('md-talla').value.toUpperCase(),
            lote: document.getElementById('md-lote').value.trim().toUpperCase(), cantidad: document.getElementById('md-cantidad').value,
            referencia: document.getElementById('md-referencia').value, responsable: document.getElementById('md-responsable').value
        };
        if(!data.modelo || !data.lote || !data.cantidad || !data.referencia || !data.responsable) return showToast("Faltan datos", "danger");

        const btn = document.getElementById('btn-save-modal'); btn.innerHTML = "Procesando..."; btn.disabled = true;
        try {
            const res = await fetch('/api/movimiento', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            const result = await res.json();
            if(res.ok) {
                localStorage.setItem('almacen_resp', data.responsable);
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                showToast(`Folio: ${result.folio}`); cerrarModal('modalSAP'); cargarKardex(); cargarHistorial();
            } else showToast(result.error, "danger");
        } catch(e) { showToast("Error de red", "danger"); } finally { btn.innerHTML = "💾 Confirmar"; btn.disabled = false; }
    }

    function procesarExcelMasivo(){
        const file = document.getElementById('file-masivo').files[0];
        const tipo = document.getElementById('mas-tipo').value;
        const loteGlobal = document.getElementById('mas-lote').value.trim().toUpperCase();
        const referenciaGlobal = document.getElementById('mas-referencia').value.trim();
        const responsable = document.getElementById('mas-responsable').value.trim();

        if(!file || !loteGlobal || !referenciaGlobal || !responsable) return showToast("Llena todos los campos y sube el archivo", "warning");

        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            let items = [];
            rows.forEach(r => {
                if(r.MODELO && r.COLOR && r.TALLA && r.CANTIDAD) {
                    items.push({ modelo: String(r.MODELO), color: String(r.COLOR), talla: String(r.TALLA), cantidad: parseFloat(r.CANTIDAD) });
                }
            });

            if(items.length === 0) return showToast("El Excel no tiene las columnas MODELO, COLOR, TALLA, CANTIDAD", "danger");

            const btn = document.getElementById('btn-save-masivo'); btn.innerHTML = "⚡ Subiendo..."; btn.disabled = true;
            try {
                const res = await fetch('/api/movimiento-masivo', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tipo, loteGlobal, referenciaGlobal, responsable, items })
                });
                const result = await res.json();
                if(res.ok) {
                    localStorage.setItem('almacen_resp', responsable);
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 } });
                    showToast(`Éxito! Folio ${result.folio}. Se procesaron ${result.procesados} registros.`);
                    if(result.errores && result.errores.length > 0) alert("Algunos fallaron por falta de stock:\n" + result.errores.join("\n"));
                    cerrarModal('modalMasivo'); cargarKardex(); cargarHistorial();
                } else showToast(result.error, "danger");
            } catch(e) { showToast("Error de conexión", "danger"); } finally { btn.innerHTML = "⚡ Procesar Excel"; btn.disabled = false; }
        };
        reader.readAsArrayBuffer(file);
    }

    cargarKardex(); cargarHistorial();
</script>
</body>
</html>
