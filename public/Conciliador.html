<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procesador de Etiquetas Zebra</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #333;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .card {
            background: #ffffff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 { color: #1f2937; font-size: 1.5rem; margin-top: 0;}
        p { color: #4b5563; font-size: 0.95rem; }
        input[type="file"] {
            display: block;
            margin: 15px 0;
            padding: 10px;
            border: 1px dashed #d1d5db;
            width: 95%;
            border-radius: 5px;
        }
        textarea {
            width: 100%;
            height: 250px;
            margin-top: 10px;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #d1d5db;
            border-radius: 5px;
            resize: vertical;
        }
        .btn-descargar {
            background-color: #4f46e5;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn-descargar:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛠️ Corrector de Etiquetas Odoo -> Zebra</h2>
        <p>1. Sube tu archivo <strong>.txt</strong> o <strong>.zpl</strong> descargado.</p>
        <input type="file" id="fileInput" accept=".txt,.zpl" />

        <p>2. Previsualización del código corregido (con código de barras):</p>
        <textarea id="outputArea" placeholder="Aquí aparecerá el código ZPL listo para imprimir..."></textarea>

        <button class="btn-descargar" onclick="descargarZPL()">Descargar ZPL Compatible</button>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                procesarZPL(content);
            };
            reader.readAsText(file);
        });

        function procesarZPL(zplCrudo) {
            // Dividimos el texto por cada etiqueta individual
            let etiquetas = zplCrudo.split('^XZ');
            let zplCorregido = '';

            etiquetas.forEach(etiqueta => {
                if (etiqueta.trim() === '') return;

                // Buscamos el código numérico entre corchetes, ej: [104250010]
                let skuMatch = etiqueta.match(/\[(\d+)\]/);
                let etiquetaProcesada = etiqueta.trim();

                if (skuMatch && skuMatch[1]) {
                    let sku = skuMatch[1];
                    
                    // Configuramos el código de barras
                    // ^BY2,2,60 = Ancho, proporción y altura de las barras
                    // ^FT35,140 = Coordenadas (X,Y) para ubicarlo debajo de las tallas
                    // ^BCN,60,Y,N,N = Comando para dibujar el código Code 128
                    let comandoCodigoBarras = `\n^BY2,2,60\n^FT35,150^BCN,60,Y,N,N^FD${sku}^FS`;

                    // Lo insertamos antes de cerrar la etiqueta
                    etiquetaProcesada += comandoCodigoBarras;
                }

                // Reconstruimos la etiqueta con su cierre y saltos de línea limpios
                zplCorregido += etiquetaProcesada + '\n^XZ\n\n';
            });

            // Mostramos el resultado en la caja de texto
            document.getElementById('outputArea').value = zplCorregido;
        }

        function descargarZPL() {
            const texto = document.getElementById('outputArea').value;
            if(!texto) {
                alert("Por favor, sube un archivo ZPL primero.");
                return;
            }
            
            const blob = new Blob([texto], { type: 'text/plain' });
            const enlace = document.createElement('a');
            enlace.download = 'etiquetas_listas_impresion.zpl';
            enlace.href = window.URL.createObjectURL(blob);
            enlace.click();
        }
    </script>
</body>
</html>
