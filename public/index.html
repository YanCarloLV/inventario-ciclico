<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Victoria | Operador Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --victoria-navy: #002147;
            --victoria-gold: #C5A059;
            --apple-bg: #FBFBFD;
            --glass: rgba(255, 255, 255, 0.9);
            --text-dark: #1D1D1F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--apple-bg);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Animación suave de entrada */
        @keyframes appleReveal {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal { animation: appleReveal 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        header {
            position: sticky; top: 0; z-index: 100;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 18px 25px;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        header img { height: 32px; filter: brightness(0.2); }

        .container { padding: 25px; max-width: 480px; margin: auto; }

        /* Tarjeta de Login */
        .card-login {
            background: white;
            border-radius: 28px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,33,71,0.05);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card-login h2 { font-weight: 800; font-size: 26px; margin-bottom: 10px; color: var(--victoria-navy); }

        .apple-input {
            width: 100%; padding: 18px; border-radius: 15px;
            border: 1.5px solid #E5E5E7; background: #F5F5F7;
            font-size: 16px; margin: 25px 0; outline: none;
            transition: all 0.3s;
        }

        .apple-input:focus { border-color: var(--victoria-gold); background: white; box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1); }

        .btn-victoria {
            background: var(--victoria-navy); color: white;
            border: none; padding: 18px; border-radius: 15px;
            font-size: 17px; font-weight: 600; width: 100%;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-victoria:active { transform: scale(0.96); opacity: 0.9; }

        /* Lista de Tareas Estilo "Collection" */
        .task-item {
            background: white; border-radius: 22px; padding: 22px;
            margin-bottom: 15px; display: flex; align-items: center;
            justify-content: space-between; border: 1px solid rgba(0,0,0,0.02);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: 0.3s;
        }

        .task-item:active { background: #F2F2F7; transform: scale(0.98); }

        .task-info h3 { font-size: 18px; font-weight: 700; color: var(--victoria-navy); }
        .task-info p { font-size: 14px; color: #86868B; margin-top: 2px; }

        .folio-tag {
            background: #F2F2F7; padding: 6px 12px; border-radius: 10px;
            font-size: 11px; font-weight: 800; color: var(--victoria-navy);
        }

        /* Área de Conteo */
        .product-header { text-align: center; margin-bottom: 35px; }
        .product-header h2 { font-size: 34px; font-weight: 800; color: var(--victoria-navy); letter-spacing: -1px; }

        .counter-row {
            background: white; border-radius: 20px; padding: 18px 25px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px; border: 1px solid #F2F2F7;
        }

        .talla-name { font-weight: 700; font-size: 19px; }

        .stepper-control { display: flex; align-items: center; gap: 20px; }
        .btn-circle {
            width: 48px; height: 48px; border-radius: 50%;
            border: 1.5px solid #E5E5E7; background: white;
            font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .count-num { font-size: 24px; font-weight: 800; min-width: 35px; text-align: center; color: var(--victoria-navy); }

        .footer-action {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 25px; background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05);
        }

        /* Success State */
        .success-screen { text-align: center; padding-top: 60px; display: none; }
        .success-screen .icon { 
            width: 90px; height: 90px; background: var(--victoria-gold); 
            color: white; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 45px; margin: 0 auto 30px;
        }
    </style>
</head>
<body>

<header>
    <img src="https://mens-international.com/wp-content/uploads/2021/05/Logo-Victoria-Trajes-y-Uniformes.png" alt="Victoria">
</header>

<div class="container">
    <div id="view-login" class="reveal">
        <div class="card-login">
            <h2>Gestión de Ciclos</h2>
            <p style="color:#86868B">Inicie sesión para acceder a sus tareas asignadas.</p>
            <input type="text" id="operadorNombre" class="apple-input" placeholder="Nombre del Operador">
            <button class="btn-victoria" onclick="ingresar()">Comenzar Jornada</button>
        </div>
    </div>

    <div id="view-list" class="reveal" style="display: none;">
        <h2 style="margin-bottom: 25px; font-size: 22px; font-weight: 800;">Tareas del Día</h2>
        <div id="task-list"></div>
    </div>

    <div id="view-counting" class="reveal" style="display: none;">
        <div class="product-header">
            <span id="folio-label" style="font-weight: 800; color: var(--victoria-gold); font-size: 13px;"></span>
            <h2 id="display-modelo">---</h2>
            <p id="display-color" style="color: #86868B; font-weight: 500;"></p>
        </div>

        <div id="counting-grid"></div>
        <div style="height: 140px;"></div>

        <div class="footer-action">
            <button class="btn-victoria" onclick="finalizarInventario()">Finalizar y Registrar</button>
        </div>
    </div>

    <div id="view-success" class="success-screen reveal">
        <div class="icon">✓</div>
        <h2 style="font-weight: 800;">Registro Exitoso</h2>
        <p style="color:#86868B; margin: 15px 0 40px;">Los datos han sido enviados al panel de supervisor.</p>
        <button class="btn-victoria" style="background: var(--victoria-gold);" onclick="location.reload()">Nueva Tarea</button>
    </div>
</div>

<script>
    let operador = "";
    let inventarioActivo = null;
    let datosConteo = {};

    async function ingresar() {
        const nombre = document.getElementById('operadorNombre').value.trim();
        if(!nombre) return;
        operador = nombre;
        document.getElementById('view-login').style.display = 'none';
        document.getElementById('view-list').style.display = 'block';
        refrescarTareas();
    }

    async function refrescarTareas() {
        const res = await fetch('/api/ciclicos');
        const data = await res.json();
        const container = document.getElementById('task-list');
        container.innerHTML = "";

        const filtro = data.filter(i => i.estatus === 'Pendiente' || (i.estatus === 'En Proceso' && i.asignadoA === operador));

        if(filtro.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:50px; color:#AEAEB2;">No hay tareas disponibles.</div>`;
            return;
        }

        filtro.forEach(t => {
            const div = document.createElement('div');
            div.className = "task-item";
            div.onclick = () => abrirInventario(t);
            div.innerHTML = `
                <div class="task-info">
                    <h3>${t.modelo}</h3>
                    <p>${t.color}</p>
                </div>
                <div class="folio-tag">${t.id}</div>
            `;
            container.appendChild(div);
        });
    }

    async function abrirInventario(t) {
        inventarioActivo = t;
        const hora = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        
        await fetch('/api/asignar-operador', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: t.id, operador: operador, horaInicio: hora })
        });

        document.getElementById('view-list').style.display = 'none';
        document.getElementById('view-counting').style.display = 'block';
        
        document.getElementById('folio-label').innerText = `ORDEN ${t.id}`;
        document.getElementById('display-modelo').innerText = t.modelo;
        document.getElementById('display-color').innerText = t.color;

        const grid = document.getElementById('counting-grid');
        grid.innerHTML = "";
        t.tallas.forEach(talla => {
            datosConteo[talla] = 0;
            grid.innerHTML += `
                <div class="counter-row">
                    <span class="talla-name">${talla}</span>
                    <div class="stepper-control">
                        <button class="btn-circle" onclick="updateCount('${talla}', -1)">-</button>
                        <span class="count-num" id="qty-${talla}">0</span>
                        <button class="btn-circle" onclick="updateCount('${talla}', 1)" style="background:var(--victoria-navy); color:white; border:none;">+</button>
                    </div>
                </div>
            `;
        });
    }

    function updateCount(talla, val) {
        datosConteo[talla] = Math.max(0, datosConteo[talla] + val);
        document.getElementById(`qty-${talla}`).innerText = datosConteo[talla];
        actualizarProgresoAPI();
    }

    async function actualizarProgresoAPI() {
        const total = inventarioActivo.tallas.length;
        const realizados = Object.values(datosConteo).filter(v => v > 0).length;
        const pct = Math.round((realizados / total) * 100);

        fetch('/api/actualizar-progreso', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                id: inventarioActivo.id, 
                progreso: pct,
                conteoActual: realizados,
                resultados: Object.keys(datosConteo).map(t => ({ talla: t, cantidad: datosConteo[t] }))
            })
        });
    }

    async function finalizarInventario() {
        if(!confirm("¿Confirmar envío de conteo?")) return;
        const hora = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        
        const res = await fetch('/api/actualizar-progreso', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                id: inventarioActivo.id, 
                progreso: 100,
                estatus: "Finalizado",
                horaFin: hora,
                resultados: Object.keys(datosConteo).map(t => ({ talla: t, cantidad: datosConteo[t] }))
            })
        });

        if(res.ok) {
            document.getElementById('view-counting').style.display = 'none';
            document.getElementById('view-success').style.display = 'block';
        }
    }
</script>
</body>
</html>
