<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventarios - Operador Pro</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); margin-bottom: 20px; transition: 0.3s; }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 22px; }
        
        /* Login Screen */
        #login-screen { display: none; max-width: 400px; margin: 100px auto; text-align: center; }
        .input-pro { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; outline: none; }

        /* Lista de Inventarios */
        .item-pend { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 18px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 12px;
            background: #fff; cursor: pointer; transition: 0.2s;
        }
        .item-pend:active { transform: scale(0.98); }
        .item-pend.busy { opacity: 0.6; cursor: not-allowed; background: #f5f5f5; filter: grayscale(1); }
        
        .tag-status { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 700; text-transform: uppercase; }
        .tag-busy { background: #ffeaa7; color: #d63031; }
        .tag-mine { background: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .tag-free { background: #f3f4f6; color: #374151; }

        /* Empty State (Sin Inventarios) */
        .empty-state { text-align: center; padding: 40px 20px; background: white; border-radius: 12px; border: 2px dashed #cbd5e1; color: #64748b; margin-top: 10px; }
        .empty-state h3 { color: #334155; margin: 15px 0 5px 0; font-size: 18px; }

        /* Pantalla de Conteo Activo */
        #conteo-screen { display: none; }
        .header-active { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        
        /* ESTILO PARA LA FOTO Y EL ZOOM */
        .foto-referencia {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            background: white;
            cursor: zoom-in;
            display: none;
        }

        /* Capa de Zoom (Modal) */
        #modal-zoom {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        #modal-zoom img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Modal para Teclado Numérico */
        #modal-cantidad {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }
        .modal-caja {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 85%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .input-num {
            width: 100%;
            padding: 15px;
            font-size: 28px;
            text-align: center;
            border: 2px solid #3498db;
            border-radius: 12px;
            margin: 15px 0;
            box-sizing: border-box;
            outline: none;
            color: #2c3e50;
            font-weight: bold;
        }
        .input-num:focus { border-color: #2980b9; box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); }

        /* Barra de Progreso */
        .progress-wrapper { position: sticky; top: 0; background-color: white; padding: 15px 0; margin-bottom: 15px; z-index: 1000; border-bottom: 1px solid #f3f4f6; }
        .progress-bg { background: #e5e7eb; height: 14px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60); width: 0%; transition: 1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        
        .talla-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f3f4f6; }
        .talla-info b { font-size: 18px; color: #2c3e50; }
        
        .btn-action { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-finish { background: #27ae60; color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 25px; }
        .btn-back { background: transparent; color: #94a3b8; border: none; margin-top: 15px; width: 100%; font-size: 14px; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="modal-zoom" onclick="cerrarZoom()">
        <img id="img-ampliada" src="">
    </div>

    <div id="modal-cantidad">
        <div class="modal-caja">
            <h3 style="margin-top:0; color:#2c3e50;">Cantidad para la talla</h3>
            <h1 id="modal-talla-label" style="margin:5px 0; color:#e67e22; font-size: 36px;">--</h1>
            <input type="number" id="input-cantidad" class="input-num" inputmode="numeric" pattern="[0-9]*" placeholder="0">
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="cerrarModalCantidad()" style="flex:1; padding:15px; background:#ecf0f1; color:#7f8c8d; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px;">Cancelar</button>
                <button onclick="guardarCantidadModal()" style="flex:1; padding:15px; background:#3498db; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px;">Guardar</button>
            </div>
        </div>
    </div>

    <div id="login-screen" class="card">
        <img src="/logo.png" style="max-height: 80px; margin-bottom: 20px;">
        <h2>Identificación de Operador</h2>
        <input type="text" id="nombre-input" class="input-pro" placeholder="Tu nombre completo">
        <button class="btn-finish" style="margin-top:0;" onclick="guardarNombre()">Comenzar Jornada</button>
    </div>

    <div id="listado-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2 id="saludo-user" style="margin:0;">Cargando...</h2>
            <button onclick="localStorage.clear(); location.reload();" style="font-size:10px; border:none; background:none; color:gray;">Cerrar Sesión</button>
        </div>
        <div id="lista-pendientes"></div>
    </div>

    <div id="conteo-screen">
        <div class="header-active" id="info-header"></div>
        <div class="card">
            <div class="progress-wrapper">
                <div style="display:flex; justify-content:space-between; font-size: 12px; margin-bottom: 5px;">
                    <b id="texto-progreso">Progreso: 0%</b>
                    <span id="contador-tallas">0/0 Tallas</span>
                </div>
                <div class="progress-bg"><div id="bar-progreso" class="progress-fill"></div></div>
            </div>
            <div id="lista-tallas-conteo"></div>
            <button class="btn-finish" id="btn-final" onclick="finalizarInventario()">✅ Enviar Reporte Final</button>
            <button class="btn-back" onclick="location.reload()">Regresar al menú principal</button>
        </div>
    </div>

<script>
    let miNombre = localStorage.getItem('operador_nombre');
    let inventarioActivo = null;
    let resultados = [];
    let tallaActivaModal = null; // Variable para saber qué talla estamos editando en el modal

    if (!miNombre) {
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('listado-screen').style.display = 'none';
    } else {
        iniciarApp();
    }

    function guardarNombre() {
        const nom = document.getElementById('nombre-input').value.trim();
        if (nom.length < 3) return alert("Por favor ingresa un nombre válido");
        localStorage.setItem('operador_nombre', nom);
        location.reload();
    }

    async function iniciarApp() {
        document.getElementById('saludo-user').innerText = `👷 ${miNombre}`;
        try {
            const res = await fetch('/api/ciclicos');
            const datos = await res.json();
            renderListaDisponibles(datos);
        } catch (e) { console.error("Error al cargar"); }
    }

    function renderListaDisponibles(datos) {
        const contenedor = document.getElementById('lista-pendientes');
        contenedor.innerHTML = "";
        const disponibles = datos.filter(d => d.estatus !== "Finalizado");

        if (disponibles.length === 0) {
            contenedor.innerHTML = `
                <div class="empty-state">
                    <span style="font-size: 45px;">☕</span>
                    <h3>¡Todo al día!</h3>
                    <p>Por el momento no hay inventarios asignados. Excelente trabajo.</p>
                </div>
            `;
            return;
        }

        disponibles.forEach(inv => {
            const isMine = inv.asignadoA === miNombre;
            const isBusy = inv.asignadoA && inv.asignadoA !== miNombre;
            const div = document.createElement('div');
            div.className = `item-pend ${isBusy ? 'busy' : ''}`;
            div.innerHTML = `
                <div class="talla-info">
                    <b>${inv.modelo}</b><br>
                    <small style="color:#666">${inv.color} • ${inv.totalTallas} tallas</small>
                </div>
                <div>
                    ${isBusy ? `<span class="tag-status tag-busy">🔒 Ocupado</span>` : ''}
                    ${isMine ? `<span class="tag-status tag-mine">En Proceso</span>` : ''}
                    ${!inv.asignadoA ? `<span class="tag-status tag-free">Libre</span>` : ''}
                </div>
            `;
            if (!isBusy) div.onclick = () => apartarInventario(inv);
            contenedor.appendChild(div);
        });
    }

    async function apartarInventario(inv) {
        let horaInicioParam = null;
        if (!inv.asignadoA || inv.estatus === "Pendiente") {
            const ahora = new Date();
            horaInicioParam = ahora.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        const res = await fetch('/api/asignar-operador', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: inv.id, operador: miNombre, horaInicio: horaInicioParam })
        });
        if ((await res.json()).success) {
            const res2 = await fetch('/api/ciclicos');
            const todos = await res2.json();
            const invAct = todos.find(i => i.id == inv.id);
            resultados = invAct.resultados || [];
            abrirConteo(invAct);
        }
    }

    function abrirConteo(inv) {
        inventarioActivo = inv;
        document.getElementById('listado-screen').style.display = 'none';
        document.getElementById('conteo-screen').style.display = 'block';
        const rutaFoto = `/fotos/${inv.modelo}.jpg`;

        document.getElementById('info-header').innerHTML = `
            <div style="display:flex; gap:15px; align-items:center;">
                <img src="${rutaFoto}" class="foto-referencia" 
                     onclick="verZoom('${rutaFoto}')"
                     onload="this.style.display='block'" 
                     onerror="this.style.display='none'">
                <div>
                    <small style="opacity:0.8">ID: #${inv.id}</small>
                    <h2 style="color:white; margin:0;">${inv.modelo}</h2>
                    <p style="margin:5px 0 0 0; opacity:0.9">${inv.color}</p>
                    <small style="font-size:10px; color:#3498db; background:white; padding:2px 5px; border-radius:4px; margin-top:5px; display:inline-block;">Click en foto para ampliar</small>
                </div>
            </div>
        `;
        renderTallas();
    }

    function verZoom(src) {
        document.getElementById('img-ampliada').src = src;
        document.getElementById('modal-zoom').style.display = 'flex';
    }
    function cerrarZoom() {
        document.getElementById('modal-zoom').style.display = 'none';
    }

    function renderTallas() {
        const lista = document.getElementById('lista-tallas-conteo');
        lista.innerHTML = "";
        inventarioActivo.tallas.forEach(talla => {
            const yaContada = resultados.find(r => r.talla === talla);
            lista.innerHTML += `
                <div class="talla-item" style="${yaContada ? 'background:#f0fdf4' : ''}">
                    <div class="talla-info"><b>${talla}</b></div>
                    ${yaContada 
                        ? `<div><span style="color:#16a34a; font-weight:bold; font-size:18px; margin-right:10px;">✔ ${yaContada.cantidad}</span> <button onclick="borrarTalla('${talla}')" style="border:none; background:none; color:#e74c3c; cursor:pointer; font-size:12px; font-weight:bold; text-decoration:underline;">Rehacer</button></div>`
                        : `<button class="btn-action" onclick="abrirModalCantidad('${talla}')">CONTAR</button>`
                    }
                </div>
            `;
        });
        actualizarProgresoVisual();
    }

    // NUVAS FUNCIONES PARA EL MODAL NUMÉRICO
    function abrirModalCantidad(talla) {
        tallaActivaModal = talla;
        document.getElementById('modal-talla-label').innerText = talla;
        const inputNum = document.getElementById('input-cantidad');
        inputNum.value = ""; // Limpiar input
        document.getElementById('modal-cantidad').style.display = 'flex';
        
        // Pequeño delay para asegurar que el teclado numérico se levante automáticamente
        setTimeout(() => inputNum.focus(), 100);
    }

    function cerrarModalCantidad() {
        document.getElementById('modal-cantidad').style.display = 'none';
        tallaActivaModal = null;
    }

    function guardarCantidadModal() {
        const valStr = document.getElementById('input-cantidad').value;
        if (!valStr || valStr === "") {
            alert("Por favor, ingresa una cantidad válida.");
            return;
        }
        
        const n = parseInt(valStr);
        if (isNaN(n) || n < 0) return;

        resultados.push({ talla: tallaActivaModal, cantidad: n });
        cerrarModalCantidad();
        enviarAvance();
        renderTallas();
    }

    // Permitir guardar al presionar la tecla "Enter" en el teclado del celular
    document.getElementById('input-cantidad').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            guardarCantidadModal();
        }
    });

    function borrarTalla(talla) {
        resultados = resultados.filter(r => r.talla !== talla);
        enviarAvance();
        renderTallas();
    }

    async function enviarAvance() {
        const porc = Math.round((resultados.length / inventarioActivo.totalTallas) * 100);
        fetch('/api/actualizar-progreso', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: inventarioActivo.id, progreso: porc, conteoActual: resultados.length, resultados: resultados })
        });
    }

    function actualizarProgresoVisual() {
        const porc = Math.round((resultados.length / inventarioActivo.totalTallas) * 100);
        document.getElementById('bar-progreso').style.width = porc + "%";
        document.getElementById('texto-progreso').innerText = `Progreso: ${porc}%`;
        document.getElementById('contador-tallas').innerText = `${resultados.length}/${inventarioActivo.totalTallas}`;
    }

    async function finalizarInventario() {
        if (resultados.length < inventarioActivo.totalTallas) {
            if (!confirm("Aún faltan tallas por contar. ¿Estás seguro de enviar el reporte incompleto?")) return;
        }
        const ahora = new Date();
        const horaFinStr = ahora.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const res = await fetch('/api/actualizar-progreso', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: inventarioActivo.id, progreso: 100, conteoActual: resultados.length, resultados: resultados, horaFin: horaFinStr, estatus: "Finalizado" })
        });
        if (res.ok) { 
            alert("¡Reporte enviado exitosamente!"); 
            location.reload(); 
        }
    }
</script>
</body>
</html>
