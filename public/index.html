<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Inventarios - Operador Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-navy: #001A33;
            --brand-gold: #C5A059;
            --brand-orange: #FF8C00;
            --bg-apple: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-dark: #1C1C1E;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-apple); 
            margin: 0; padding: 0 0 20px 0; 
            color: var(--text-dark); 
            -webkit-tap-highlight-color: transparent;
        }

        /* Animación suave de entrada */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: reveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* Header Institucional Centrado */
        header {
            background: var(--brand-navy);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--brand-orange);
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        .logo-wrap {
            background: white;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }
        header img { height: 35px; object-fit: contain; vertical-align: middle; }

        .card { 
            background: var(--card-bg); padding: 30px 25px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin: 0 15px 20px 15px; 
            transition: 0.3s; 
        }
        h2 { margin-top: 0; color: var(--brand-navy); font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

        /* Login Screen */
        #login-screen { display: none; max-width: 400px; margin: 40px auto; text-align: center; }
        .input-pro { 
            width: 100%; padding: 18px; border: 2px solid #E5E5EA; border-radius: 16px; 
            margin-bottom: 20px; font-size: 16px; box-sizing: border-box; outline: none; 
            background: #F9F9FB; transition: 0.3s; font-family: inherit; font-weight: 600;
        }
        .input-pro:focus { border-color: var(--brand-orange); background: white; box-shadow: 0 0 0 4px rgba(255,140,0,0.1); }

        /* Lista de Inventarios */
        #listado-screen { padding: 0 15px; }
        .item-pend { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.03); margin-bottom: 15px;
            background: #fff; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .item-pend:active { transform: scale(0.96); background: #F9F9FB; }
        .item-pend.busy { opacity: 0.7; cursor: not-allowed; background: #F2F2F7; filter: grayscale(1); box-shadow: none; }
        
        .talla-info b { font-size: 18px; color: var(--brand-navy); font-weight: 800; }
        .talla-info small { font-weight: 600; margin-top: 4px; display: inline-block; }

        .tag-status { font-size: 11px; padding: 6px 12px; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .tag-busy { background: #FFEBEB; color: #FF3B30; }
        .tag-mine { background: #E8F2FF; color: #007AFF; border: 1px solid #007AFF; }
        .tag-free { background: #F2F2F7; color: #8E8E93; }

        /* Empty State */
        .empty-state { text-align: center; padding: 50px 20px; background: white; border-radius: 20px; border: 2px dashed #D2D2D7; color: #8E8E93; margin-top: 10px; }
        .empty-state h3 { color: var(--brand-navy); margin: 15px 0 5px 0; font-size: 20px; font-weight: 800; }

        /* Pantalla de Conteo Activo */
        #conteo-screen { display: none; padding: 0 15px; }
        .header-active { 
            background: var(--brand-navy); color: white; padding: 20px; border-radius: 24px; 
            margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,26,51,0.2);
        }
        
        /* ESTILO PARA LA FOTO Y EL ZOOM */
        .foto-referencia {
            width: 80px; height: 80px; object-fit: cover; border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.2); background: white; cursor: zoom-in; display: none;
        }

        /* Modal Zoom */
        #modal-zoom {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out;
            backdrop-filter: blur(5px);
        }
        #modal-zoom img { max-width: 90%; max-height: 80%; border-radius: 16px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }

        /* Modal Cantidad */
        #modal-cantidad {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 3000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-caja {
            background: white; padding: 30px; border-radius: 28px; width: 85%; max-width: 320px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: reveal 0.3s ease-out;
        }
        .input-num {
            width: 100%; padding: 15px; font-size: 32px; text-align: center; border: 2px solid var(--brand-navy);
            border-radius: 16px; margin: 20px 0; box-sizing: border-box; outline: none; color: var(--brand-navy);
            font-weight: 800; background: #F9F9FB; font-family: inherit;
        }
        .input-num:focus { border-color: var(--brand-orange); box-shadow: 0 0 0 4px rgba(255,140,0,0.1); }

        /* Barra de Progreso */
        .progress-wrapper { position: sticky; top: 80px; background-color: var(--card-bg); padding: 15px 0; margin-bottom: 15px; z-index: 90; border-bottom: 1px solid #F2F2F7; }
        .progress-bg { background: #E5E5EA; height: 12px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--brand-orange); width: 0%; transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        /* Tallas Listado */
        .talla-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid #F2F2F7; transition: 0.3s; }
        .talla-item:last-child { border-bottom: none; }
        .talla-info b { font-size: 18px; color: var(--brand-navy); font-weight: 800; }
        
        /* Botones */
        .btn-action { 
            background: var(--brand-navy); color: white; border: none; padding: 12px 24px; 
            border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn-action:active { transform: scale(0.94); opacity: 0.9; }
        
        .btn-finish { 
            background: var(--brand-orange); color: white; width: 100%; padding: 20px; 
            border: none; border-radius: 18px; font-size: 18px; font-weight: 800; 
            margin-top: 25px; cursor: pointer; transition: 0.3s; font-family: inherit;
            box-shadow: 0 10px 20px rgba(255,140,0,0.2);
        }
        .btn-finish:active { transform: scale(0.96); }
        
        .btn-back { background: transparent; color: #8E8E93; border: none; margin-top: 20px; width: 100%; font-size: 15px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-wrap">
            <img src="/logo.png" alt="Logo">
        </div>
    </header>

    <div id="modal-zoom" onclick="cerrarZoom()">
        <img id="img-ampliada" src="">
    </div>

    <div id="modal-cantidad">
        <div class="modal-caja">
            <h3 style="margin-top:0; color:#8E8E93; font-size: 14px; text-transform: uppercase;">Cantidad para la talla</h3>
            <h1 id="modal-talla-label" style="margin:5px 0; color:var(--brand-navy); font-size: 42px; font-weight: 800;">--</h1>
            <input type="number" id="input-cantidad" class="input-num" inputmode="numeric" pattern="[0-9]*" placeholder="0">
            
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button onclick="cerrarModalCantidad()" style="flex:1; padding:18px; background:#F2F2F7; color:#1C1C1E; border:none; border-radius:14px; font-weight:700; cursor:pointer; font-size:16px; font-family:inherit;">Cancelar</button>
                <button onclick="guardarCantidadModal()" style="flex:1; padding:18px; background:var(--brand-navy); color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer; font-size:16px; font-family:inherit;">Guardar</button>
            </div>
        </div>
    </div>

    <div id="login-screen" class="card reveal">
        <h2>Identificación de Operador</h2>
        <p style="color: #8E8E93; margin-bottom: 25px; font-size: 14px; font-weight: 600;">Ingrese su nombre para continuar</p>
        <input type="text" id="nombre-input" class="input-pro" placeholder="Tu nombre completo">
        <button class="btn-finish" style="margin-top:0; background: var(--brand-navy); box-shadow: 0 10px 20px rgba(0,26,51,0.2);" onclick="guardarNombre()">Comenzar Jornada</button>
    </div>

    <div id="listado-screen" class="reveal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
            <h2 id="saludo-user" style="margin:0; font-size: 20px;">Cargando...</h2>
            <button onclick="localStorage.clear(); location.reload();" style="font-size:12px; font-weight:700; border:none; background:#F2F2F7; padding:8px 12px; border-radius:10px; color:#FF3B30; cursor:pointer;">Cerrar Sesión</button>
        </div>
        <div id="lista-pendientes"></div>
    </div>

    <div id="conteo-screen" class="reveal">
        <div class="header-active" id="info-header"></div>
        <div class="card" style="margin: 0;">
            <div class="progress-wrapper">
                <div style="display:flex; justify-content:space-between; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--brand-navy);">
                    <b id="texto-progreso">Progreso: 0%</b>
                    <span id="contador-tallas">0/0 Tallas</span>
                </div>
                <div class="progress-bg"><div id="bar-progreso" class="progress-fill"></div></div>
            </div>
            <div id="lista-tallas-conteo"></div>
            <button class="btn-finish" id="btn-final" onclick="finalizarInventario()">✅ Enviar Reporte Final</button>
            <button class="btn-back" onclick="location.reload()">Regresar al menú principal</button>
        </div>
    </div>

<script>
    // SE MANTIENE EL 100% DE LA LÓGICA ORIGINAL
    let miNombre = localStorage.getItem('operador_nombre');
    let inventarioActivo = null;
    let resultados = [];
    let tallaActivaModal = null;

    if (!miNombre) {
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('listado-screen').style.display = 'none';
    } else {
        iniciarApp();
    }

    function guardarNombre() {
        const nom = document.getElementById('nombre-input').value.trim();
        if (nom.length < 3) return alert("Por favor ingresa un nombre válido");
        localStorage.setItem('operador_nombre', nom);
        location.reload();
    }

    async function iniciarApp() {
        document.getElementById('saludo-user').innerText = `👷 ${miNombre}`;
        try {
            const res = await fetch('/api/ciclicos');
            const datos = await res.json();
            renderListaDisponibles(datos);
        } catch (e) { console.error("Error al cargar"); }
    }

    function renderListaDisponibles(datos) {
        const contenedor = document.getElementById('lista-pendientes');
        contenedor.innerHTML = "";
        const disponibles = datos.filter(d => d.estatus !== "Finalizado");

        if (disponibles.length === 0) {
            contenedor.innerHTML = `
                <div class="empty-state reveal">
                    <span style="font-size: 45px;">🚀</span>
                    <h3>¡Todo al día!</h3>
                    <p>Por el momento no hay inventarios asignados. Excelente trabajo.</p>
                </div>
            `;
            return;
        }

        disponibles.forEach(inv => {
            const isMine = inv.asignadoA === miNombre;
            const isBusy = inv.asignadoA && inv.asignadoA !== miNombre;
            const div = document.createElement('div');
            div.className = `item-pend reveal ${isBusy ? 'busy' : ''}`;
            div.innerHTML = `
                <div class="talla-info">
                    <b>${inv.modelo}</b><br>
                    <small style="color:#8E8E93">${inv.color} • ${inv.totalTallas} tallas</small>
                </div>
                <div>
                    ${isBusy ? `<span class="tag-status tag-busy">🔒 Ocupado</span>` : ''}
                    ${isMine ? `<span class="tag-status tag-mine">En Proceso</span>` : ''}
                    ${!inv.asignadoA ? `<span class="tag-status tag-free">Libre</span>` : ''}
                </div>
            `;
            if (!isBusy) div.onclick = () => apartarInventario(inv);
            contenedor.appendChild(div);
        });
    }

    async function apartarInventario(inv) {
        let horaInicioParam = null;
        if (!inv.asignadoA || inv.estatus === "Pendiente") {
            const ahora = new Date();
            horaInicioParam = ahora.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        const res = await fetch('/api/asignar-operador', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: inv.id, operador: miNombre, horaInicio: horaInicioParam })
        });
        if ((await res.json()).success) {
            const res2 = await fetch('/api/ciclicos');
            const todos = await res2.json();
            const invAct = todos.find(i => i.id == inv.id);
            resultados = invAct.resultados || [];
            abrirConteo(invAct);
        }
    }

    function abrirConteo(inv) {
        inventarioActivo = inv;
        document.getElementById('listado-screen').style.display = 'none';
        document.getElementById('conteo-screen').style.display = 'block';
        const rutaFoto = `/fotos/${inv.modelo}.jpg`;

        document.getElementById('info-header').innerHTML = `
            <div style="display:flex; gap:15px; align-items:center;">
                <img src="${rutaFoto}" class="foto-referencia" 
                     onclick="verZoom('${rutaFoto}')"
                     onload="this.style.display='block'" 
                     onerror="this.style.display='none'">
                <div>
                    <small style="opacity:0.8; font-weight:700;">ID: #${inv.id}</small>
                    <h2 style="color:white; margin:0; font-size:28px;">${inv.modelo}</h2>
                    <p style="margin:5px 0 0 0; opacity:0.9; font-weight:600;">${inv.color}</p>
                    <small style="font-size:10px; color:var(--brand-navy); background:var(--brand-gold); font-weight:800; padding:4px 8px; border-radius:8px; margin-top:8px; display:inline-block;">Ampliar Foto</small>
                </div>
            </div>
        `;
        renderTallas();
    }

    function verZoom(src) {
        document.getElementById('img-ampliada').src = src;
        document.getElementById('modal-zoom').style.display = 'flex';
    }
    function cerrarZoom() { document.getElementById('modal-zoom').style.display = 'none'; }

    function renderTallas() {
        const lista = document.getElementById('lista-tallas-conteo');
        lista.innerHTML = "";
        inventarioActivo.tallas.forEach(talla => {
            const yaContada = resultados.find(r => r.talla === talla);
            lista.innerHTML += `
                <div class="talla-item" id="fila-talla-${talla.replace(/\s+/g, '')}" style="${yaContada ? 'background:#F9F9FB; padding: 18px 15px; border-radius: 16px;' : ''}">
                    <div class="talla-info"><b>${talla}</b></div>
                    ${yaContada 
                        ? `<div><span style="color:#34C759; font-weight:800; font-size:22px; margin-right:15px;">✔ ${yaContada.cantidad}</span> <button onclick="borrarTalla('${talla}')" style="border:none; background:#FFEBEB; padding:6px 12px; border-radius:8px; color:#FF3B30; cursor:pointer; font-size:12px; font-weight:800;">Rehacer</button></div>`
                        : `<button class="btn-action" onclick="abrirModalCantidad('${talla}')">CONTAR</button>`
                    }
                </div>
            `;
        });
        actualizarProgresoVisual();
    }

    function abrirModalCantidad(talla) {
        tallaActivaModal = talla;
        document.getElementById('modal-talla-label').innerText = talla;
        const inputNum = document.getElementById('input-cantidad');
        inputNum.value = "";
        document.getElementById('modal-cantidad').style.display = 'flex';
        setTimeout(() => inputNum.focus(), 100);
    }

    function cerrarModalCantidad() {
        document.getElementById('modal-cantidad').style.display = 'none';
        tallaActivaModal = null;
    }

    function guardarCantidadModal() {
        const valStr = document.getElementById('input-cantidad').value;
        if (!valStr || valStr === "") {
            alert("Por favor, ingresa una cantidad válida.");
            return;
        }
        
        const n = parseInt(valStr);
        if (isNaN(n) || n < 0) return;

        resultados.push({ talla: tallaActivaModal, cantidad: n });
        cerrarModalCantidad();
        enviarAvance();
        
        renderTallas();
        enfocarSiguienteTalla();
    }

    function enfocarSiguienteTalla() {
        const primerBotonPendiente = document.querySelector('.btn-action');
        if (primerBotonPendiente) {
            primerBotonPendiente.closest('.talla-item').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }

    document.getElementById('input-cantidad').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { guardarCantidadModal(); }
    });

    function borrarTalla(talla) {
        resultados = resultados.filter(r => r.talla !== talla);
        enviarAvance();
        renderTallas();
    }

    async function enviarAvance() {
        const porc = Math.round((resultados.length / inventarioActivo.totalTallas) * 100);
        fetch('/api/actualizar-progreso', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: inventarioActivo.id, progreso: porc, conteoActual: resultados.length, resultados: resultados })
        });
    }

    function actualizarProgresoVisual() {
        const porc = Math.round((resultados.length / inventarioActivo.totalTallas) * 100);
        document.getElementById('bar-progreso').style.width = porc + "%";
        document.getElementById('texto-progreso').innerText = `Progreso: ${porc}%`;
        document.getElementById('contador-tallas').innerText = `${resultados.length}/${inventarioActivo.totalTallas}`;
    }

    async function finalizarInventario() {
        if (resultados.length < inventarioActivo.totalTallas) {
            if (!confirm("Aún faltan tallas por contar. ¿Estás seguro de enviar el reporte incompleto?")) return;
        }
        const ahora = new Date();
        const horaFinStr = ahora.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const res = await fetch('/api/actualizar-progreso', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: inventarioActivo.id, progreso: 100, conteoActual: resultados.length, resultados: resultados, horaFin: horaFinStr, estatus: "Finalizado" })
        });
        if (res.ok) { 
            alert("¡Reporte enviado exitosamente!"); 
            location.reload(); 
        }
    }
</script>
</body>
</html>
