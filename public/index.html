<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Inventarios - Operador Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --brand-navy: #001A33;
            --brand-gold: #C5A059;
            --brand-orange: #FF8C00;
            --bg-apple: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-dark: #1C1C1E;
            --bg-canela: #FFEAD1; /* Canela Fondo 2 Oscuro 10% */
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-apple); 
            margin: 0; padding: 0 0 20px 0; 
            color: var(--text-dark); 
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.5s ease;
        }

        /* Animaciones */
        @keyframes reveal { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { animation: reveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .pop-in { display: inline-block; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 2s infinite ease-in-out; }

        @keyframes pulseSkeleton { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .skeleton { background: #E5E5EA; border-radius: 20px; animation: pulseSkeleton 1.5s infinite; border: none; box-shadow: none; pointer-events: none; }

        /* Header Institucional Centrado */
        header {
            background: var(--brand-navy);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--brand-orange);
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        .logo-wrap {
            background: white; display: inline-block; padding: 12px 30px;
            border-radius: 35px; box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }
        header img { height: 60px; object-fit: contain; vertical-align: middle; }

        .card { 
            background: var(--card-bg); padding: 30px 25px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin: 0 15px 20px 15px; 
            transition: 0.3s; 
        }
        h2 { margin-top: 0; color: var(--brand-navy); font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

        /* Login Screen */
        #login-screen { display: none; max-width: 400px; margin: 40px auto; text-align: center; }
        .input-pro { 
            width: 100%; padding: 18px; border: 2px solid #E5E5EA; border-radius: 16px; 
            margin-bottom: 20px; font-size: 16px; box-sizing: border-box; outline: none; 
            background: #F9F9FB; transition: 0.3s; font-family: inherit; font-weight: 600;
        }
        .input-pro:focus { border-color: var(--brand-orange); background: white; box-shadow: 0 0 0 4px rgba(255,140,0,0.1); }

        /* Lista de Inventarios */
        #listado-screen { padding: 0 15px; }
        .item-pend { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.03); margin-bottom: 15px;
            background: #fff; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .item-pend:active { transform: scale(0.96); background: #F9F9FB; }
        .item-pend.busy { opacity: 0.7; cursor: not-allowed; background: #F2F2F7; filter: grayscale(1); box-shadow: none; }
        
        .talla-info b { font-size: 18px; color: var(--brand-navy); font-weight: 800; }
        .talla-info small { font-weight: 600; margin-top: 4px; display: inline-block; }

        .tag-status { font-size: 11px; padding: 6px 12px; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .tag-busy { background: #FFEBEB; color: #FF3B30; }
        .tag-mine { background: #E8F2FF; color: #007AFF; border: 1px solid #007AFF; }
        .tag-free { background: #F2F2F7; color: #8E8E93; }

        /* Empty State */
        .empty-state { text-align: center; padding: 50px 20px; background: white; border-radius: 20px; border: 2px dashed #D2D2D7; color: #8E8E93; margin-top: 10px; }
        .empty-state h3 { color: var(--brand-navy); margin: 15px 0 5px 0; font-size: 20px; font-weight: 800; }

        /* Pantalla de Conteo Activo (Aesthetic Premium) */
        #conteo-screen { display: none; padding: 0 15px; }
        
        /* BLOQUE PEGAJOSO (FOTO + BARRA) */
        .sticky-conteo-panel {
            position: sticky;
            top: 127px; /* Justo debajo del header principal sin dejar huecos */
            z-index: 95;
            background: var(--bg-canela);
            margin: 0 -15px 15px -15px; /* Compensa el padding de la pantalla para tapar todo el ancho */
            padding: 5px 15px 15px 15px;
            box-shadow: 0 15px 20px -15px rgba(0,0,0,0.08); /* Sombra elegante que separa el panel de las tallas */
            border-bottom: 1px solid rgba(0,0,0,0.04);
            transition: background-color 0.5s ease;
        }

        .header-active { 
            background: var(--brand-navy); color: white; padding: 20px; border-radius: 24px; 
            margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,26,51,0.2); border: 2px solid var(--brand-gold);
        }
        
        /* ESTILO PARA LA FOTO Y EL ZOOM */
        .foto-referencia {
            width: 80px; height: 80px; object-fit: cover; border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.2); background: white; cursor: zoom-in; display: none;
        }

        /* Modal Zoom */
        #modal-zoom {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out;
            backdrop-filter: blur(5px);
        }
        #modal-zoom img { max-width: 90%; max-height: 80%; border-radius: 16px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }

        /* Modal Cantidad */
        #modal-cantidad {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,26,51,0.8); z-index: 3000; justify-content: center; align-items: center;
            backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s;
        }
        #modal-cantidad.visible { opacity: 1; }
        .modal-caja {
            background: white; padding: 30px; border-radius: 28px; width: 85%; max-width: 320px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); transform: translateY(100px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid var(--brand-gold);
        }
        #modal-cantidad.visible .modal-caja { transform: translateY(0); }
        .input-num {
            width: 100%; padding: 15px; font-size: 32px; text-align: center; border: 2px solid var(--brand-navy);
            border-radius: 16px; margin: 20px 0; box-sizing: border-box; outline: none; color: var(--brand-navy);
            font-weight: 800; background: #F9F9FB; font-family: inherit;
        }
        .input-num:focus { border-color: var(--brand-orange); box-shadow: 0 0 0 4px rgba(255,140,0,0.1); }

        /* Barra de Progreso */
        .progress-wrapper { position: relative; background-color: transparent; padding: 0; margin-bottom: 0; z-index: 90; border-bottom: none; }
        .progress-bg { background: #E5E5EA; height: 12px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--brand-orange); width: 0%; transition: width 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        /* Tallas Listado Premium */
        .talla-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 18px; margin-bottom: 12px; background: white;
            border-radius: 16px; border-left: 6px solid var(--brand-navy);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; 
        }
        .talla-item.counted {
            border-left-color: #34C759;
            background: #F9FFF9;
        }
        .talla-info b { font-size: 18px; color: var(--brand-navy); font-weight: 800; }
        
        /* Botones */
        .btn-action { 
            background: var(--brand-navy); color: white; border: none; padding: 12px 24px; 
            border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn-action:active { transform: scale(0.94); opacity: 0.9; }
        
        .btn-finish { 
            background: linear-gradient(135deg, var(--brand-orange), #E67E22);
            color: white; width: 100%; padding: 22px; 
            border: none; border-radius: 20px; font-size: 18px; font-weight: 800; 
            margin-top: 25px; cursor: pointer; transition: 0.3s; font-family: inherit;
            box-shadow: 0 10px 20px rgba(255,140,0,0.3); position: relative; overflow: hidden;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-finish:active { transform: scale(0.96); box-shadow: 0 5px 10px rgba(255,140,0,0.3); }
        
        .btn-back { background: transparent; color: #8E8E93; border: none; margin-top: 20px; width: 100%; font-size: 15px; font-weight: 600; cursor: pointer; }

        /* Notificaciones Toast Operador */
        #toast-op { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #34C759; color: white; padding: 15px 25px; border-radius: 20px; font-weight: 700; box-shadow: 0 10px 25px rgba(52, 199, 89, 0.4); z-index: 4000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
        #toast-op.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ========================================================== */
        /* CSS FAKE LOADER PREMIUM (CÍRCULO CON COLORES ORIGINALES) */
        /* ========================================================== */
        #fake-loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 26, 51, 0.96); z-index: 99999; justify-content: center; align-items: center;
            flex-direction: column; color: white; opacity: 0; transition: opacity 0.5s ease;
            backdrop-filter: blur(8px);
        }
        #fake-loader-overlay.show { display: flex; opacity: 1; }

        .loader-content { text-align: center; max-width: 400px; padding: 40px; }

        .icon-container {
            width: 160px; height: 160px; margin: 0 auto 30px auto;
            position: relative; display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.02);
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            overflow: hidden; 
        }

        .circle-liquid {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(52, 199, 89, 0.25); 
            border-top: 2px solid rgba(52, 199, 89, 0.8); 
            box-shadow: 0 -15px 30px rgba(52, 199, 89, 0.4) inset, 0 -10px 20px rgba(52, 199, 89, 0.6); 
            transform: translateY(100%);
            transition: transform 6.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 1;
        }

        #fake-loader-overlay.animating .circle-liquid {
            transform: translateY(0%);
        }

        .icon-base {
            width: 65%; height: 65%; object-fit: contain;
            position: relative; z-index: 2;
            opacity: 0.5;
            transition: all 6.5s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        #fake-loader-overlay.animating .icon-base {
            opacity: 1;
            transform: scale(1.08); 
            filter: drop-shadow(0 0 15px rgba(52, 199, 89, 0.7)); 
        }

        #fake-loader-msg { font-weight: 800; font-size: 24px; margin: 0; letter-spacing: -0.5px; }
        #fake-loader-status { color: var(--brand-gold); font-size: 14px; text-transform: uppercase; font-weight: 700; margin-top: 10px; letter-spacing: 1px; }
        #fake-loader-perc { font-weight: 800; font-size: 60px; color: var(--brand-orange); margin: 10px 0; font-feature-settings: "tnum"; }
        
        .prog-fake-bg { background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; width: 100%; margin-top: 20px; overflow: hidden; }
        .prog-fake-fill { background: var(--brand-orange); height: 100%; width: 0%; transition: width 6.5s linear; box-shadow: 0 0 10px rgba(255, 140, 0, 0.5); }
        #fake-loader-overlay.animating .prog-fake-fill { width: 100%; }
    </style>
</head>
<body>

<div id="fake-loader-overlay">
    <div class="loader-content reveal">
        <div class="icon-container">
            <div class="circle-liquid"></div>
            <img src="/7443348.png" class="icon-base" alt="Traje Base">
        </div>
        <p id="fake-loader-msg">Enviando reporte ciclico...</p>
        <div id="fake-loader-perc">0%</div>
        <p id="fake-loader-status">Sincronizando con el Supervisor</p>
        <div class="prog-fake-bg"><div class="prog-fake-fill"></div></div>
    </div>
</div>

    <header>
        <div class="logo-wrap">
            <img src="/logo.png" alt="Logo">
        </div>
    </header>
    
    <div id="toast-op">Reporte enviado con éxito ✅</div>

    <div id="modal-zoom" onclick="cerrarZoom()">
        <img id="img-ampliada" src="">
    </div>

    <div id="modal-cantidad">
        <div class="modal-caja">
            <h3 style="margin-top:0; color:#8E8E93; font-size: 14px; text-transform: uppercase;">Cantidad para la talla</h3>
            <h1 id="modal-talla-label" style="margin:5px 0; color:var(--brand-navy); font-size: 42px; font-weight: 800;">--</h1>
            <input type="number" id="input-cantidad" class="input-num" inputmode="numeric" pattern="[0-9]*" placeholder="0">
            
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button onclick="cerrarModalCantidad()" style="flex:1; padding:18px; background:#F2F2F7; color:#1C1C1E; border:none; border-radius:14px; font-weight:700; cursor:pointer; font-size:16px; font-family:inherit;">Cancelar</button>
                <button onclick="guardarCantidadModal()" style="flex:1; padding:18px; background:var(--brand-navy); color:white; border:none; border-radius:14px; font-weight:700; cursor:pointer; font-size:16px; font-family:inherit;">Guardar</button>
            </div>
        </div>
    </div>

    <div id="login-screen" class="card reveal">
        <h2>Identificación de Operador</h2>
        <p style="color: #8E8E93; margin-bottom: 25px; font-size: 14px; font-weight: 600;">Ingrese su nombre para continuar</p>
        <input type="text" id="nombre-input" class="input-pro" placeholder="Tu nombre completo">
        <button class="btn-finish" style="margin-top:0;" onclick="guardarNombre()">Comenzar Jornada</button>
    </div>

    <div id="listado-screen" class="reveal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
            <h2 id="saludo-user" style="margin:0; font-size: 20px;">Cargando...</h2>
            <button onclick="localStorage.clear(); location.reload();" style="font-size:12px; font-weight:700; border:none; background:#F2F2F7; padding:8px 12px; border-radius:10px; color:#FF3B30; cursor:pointer;">Cerrar Sesión</button>
        </div>
        <div id="lista-pendientes">
            <div class="item-pend skeleton" style="height: 60px;"></div>
            <div class="item-pend skeleton" style="height: 60px;"></div>
        </div>
    </div>

    <div id="conteo-screen" class="reveal">
        <div class="sticky-conteo-panel">
            <div class="header-active" id="info-header"></div>
            <div class="progress-wrapper">
                <div style="display:flex; justify-content:space-between; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--brand-navy);">
                    <b id="texto-progreso">Progreso: 0%</b>
                    <span id="contador-tallas">0/0 Tallas</span>
                </div>
                <div class="progress-bg"><div id="bar-progreso" class="progress-fill shimmer"></div></div>
            </div>
        </div>

        <div class="card" style="margin: 0; background: transparent; box-shadow: none; padding: 0;">
            <div id="lista-tallas-conteo"></div>
            <button class="btn-finish" id="btn-final" onclick="finalizarInventario()">✅ Enviar Reporte Final</button>
            <button class="btn-back" onclick="location.reload()">Regresar al menú principal</button>
        </div>
    </div>

<script>
    let miNombre = localStorage.getItem('operador_nombre');
    let inventarioActivo = null;
    let resultados = [];
    let tallaActivaModal = null;

    if (!miNombre) {
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('listado-screen').style.display = 'none';
    } else {
        iniciarApp();
    }

    function guardarNombre() {
        const nom = document.getElementById('nombre-input').value.trim();
        if (nom.length < 3) return alert("Por favor ingresa un nombre válido");
        localStorage.setItem('operador_nombre', nom);
        location.reload();
    }

    async function iniciarApp() {
        document.getElementById('saludo-user').innerText = `👷 ${miNombre}`;
        try {
            const res = await fetch('/api/ciclicos');
            const datos = await res.json();
            renderListaDisponibles(datos);
        } catch (e) { console.error("Error al cargar"); }
    }

    function renderListaDisponibles(datos) {
        const contenedor = document.getElementById('lista-pendientes');
        contenedor.innerHTML = "";
        const disponibles = datos.filter(d => d.estatus !== "Finalizado");

        if (disponibles.length === 0) {
            contenedor.innerHTML = `
                <div class="empty-state reveal">
                    <span style="font-size: 45px;">🚀</span>
                    <h3>¡Todo al día!</h3>
                    <p>Por el momento no hay inventarios asignados. Excelente trabajo.</p>
                </div>
            `;
            return;
        }

        disponibles.forEach(inv => {
            const isMine = inv.asignadoA === miNombre;
            const isBusy = inv.asignadoA && inv.asignadoA !== miNombre;
            const div = document.createElement('div');
            div.className = `item-pend reveal ${isBusy ? 'busy' : ''}`;
            div.innerHTML = `
                <div class="talla-info">
                    <b>${inv.modelo}</b><br>
                    <small style="color:#8E8E93">${inv.color} • ${inv.totalTallas} tallas</small>
                </div>
                <div>
                    ${isBusy ? `<span class="tag-status tag-busy">🔒 Ocupado por ${inv.asignadoA}</span>` : ''}
                    ${isMine ? `<span class="tag-status tag-mine">En Proceso</span>` : ''}
                    ${!inv.asignadoA ? `<span class="tag-status tag-free">Libre</span>` : ''}
                </div>
            `;
            if (!isBusy) div.onclick = () => apartarInventario(inv);
            contenedor.appendChild(div);
        });
    }

    async function apartarInventario(inv) {
        let horaInicioParam = null;
        if (!inv.asignadoA || inv.estatus === "Pendiente") {
            const ahora = new Date();
            horaInicioParam = ahora.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        const res = await fetch('/api/asignar-operador', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: inv.id, operador: miNombre, horaInicio: horaInicioParam })
        });
        if ((await res.json()).success) {
            const res2 = await fetch('/api/ciclicos');
            const todos = await res2.json();
            const invAct = todos.find(i => i.id == inv.id);
            resultados = invAct.resultados || [];
            abrirConteo(invAct);
        }
    }

    function abrirConteo(inv) {
        inventarioActivo = inv;
        document.getElementById('listado-screen').style.display = 'none';
        document.getElementById('conteo-screen').style.display = 'block';
        
        // Aplicamos el color Canela al body cuando entra a la pantalla de conteo
        document.body.style.backgroundColor = 'var(--bg-canela)';

        const rutaFoto = `/fotos/${inv.modelo}.jpg`;

        document.getElementById('info-header').innerHTML = `
            <div style="display:flex; gap:15px; align-items:center;">
                <img src="${rutaFoto}" class="foto-referencia" 
                     onclick="verZoom('${rutaFoto}')"
                     onload="this.style.display='block'" 
                     onerror="this.style.display='none'">
                <div>
                    <small style="opacity:0.8; font-weight:700; color: var(--brand-gold);">ID: #${inv.id}</small>
                    <h2 style="color:white; margin:0; font-size:28px;">${inv.modelo}</h2>
                    <p style="margin:5px 0 0 0; opacity:0.9; font-weight:600;">${inv.color}</p>
                </div>
            </div>
        `;
        renderTallas();
    }

    function verZoom(src) {
        document.getElementById('img-ampliada').src = src;
        document.getElementById('modal-zoom').style.display = 'flex';
    }
    function cerrarZoom() { document.getElementById('modal-zoom').style.display = 'none'; }

    function renderTallas() {
        const lista = document.getElementById('lista-tallas-conteo');
        lista.innerHTML = "";
        inventarioActivo.tallas.forEach(talla => {
            const yaContada = resultados.find(r => r.talla === talla);
            lista.innerHTML += `
                <div class="talla-item ${yaContada ? 'counted' : ''}" id="fila-talla-${talla.replace(/\s+/g, '')}">
                    <div class="talla-info"><b>${talla}</b></div>
                    ${yaContada 
                        ? `<div><span style="color:#34C759; font-weight:800; font-size:22px; margin-right:15px;">✔ <span class="pop-in">${yaContada.cantidad}</span></span> <button onclick="borrarTalla('${talla}')" style="border:none; background:#FFEBEB; padding:8px 14px; border-radius:10px; color:#FF3B30; cursor:pointer; font-size:12px; font-weight:800;">Rehacer</button></div>`
                        : `<button class="btn-action" onclick="abrirModalCantidad('${talla}')">CONTAR</button>`
                    }
                </div>
            `;
        });
        actualizarProgresoVisual();
    }

    function abrirModalCantidad(talla) {
        tallaActivaModal = talla;
        document.getElementById('modal-talla-label').innerText = talla;
        const inputNum = document.getElementById('input-cantidad');
        inputNum.value = "";
        
        const modal = document.getElementById('modal-cantidad');
        modal.style.display = 'flex';
        setTimeout(() => modal.classList.add('visible'), 10);
        setTimeout(() => inputNum.focus(), 300);
    }

    function cerrarModalCantidad() {
        const modal = document.getElementById('modal-cantidad');
        modal.classList.remove('visible');
        setTimeout(() => { modal.style.display = 'none'; tallaActivaModal = null; }, 300);
    }

    function guardarCantidadModal() {
        const valStr = document.getElementById('input-cantidad').value;
        if (!valStr || valStr === "") {
            alert("Por favor, ingresa una cantidad válida.");
            return;
        }
        
        const n = parseInt(valStr);
        if (isNaN(n) || n < 0) return;

        resultados.push({ talla: tallaActivaModal, cantidad: n });
        cerrarModalCantidad();
        enviarAvance();
        
        renderTallas();
        enfocarSiguienteTalla();
    }

    // =========================================================
    // NUEVA FUNCIÓN DE SCROLL MÁS INTELIGENTE Y SUAVE
    // =========================================================
    function enfocarSiguienteTalla() {
        // Le damos 50 milisegundos al navegador para que termine de dibujar los botones nuevos (la palomita verde)
        setTimeout(() => {
            const primerBotonPendiente = document.querySelector('.btn-action');
            if (primerBotonPendiente) {
                const item = primerBotonPendiente.closest('.talla-item');
                const stickyPanel = document.querySelector('.sticky-conteo-panel');
                
                // Calculamos dónde termina exactamente nuestro panel fijo
                const limiteSuperior = stickyPanel ? stickyPanel.getBoundingClientRect().bottom : 280;
                const itemPos = item.getBoundingClientRect();
                
                // UX MÁGICO: Solo scrollea si la talla quedó tapada por el panel arriba, o si está muy escondida abajo
                if (itemPos.top < limiteSuperior || itemPos.bottom > window.innerHeight) {
                    const scrollDestino = window.scrollY + itemPos.top - limiteSuperior - 15;
                    window.scrollTo({
                        top: scrollDestino,
                        behavior: 'smooth'
                    });
                }
            }
        }, 50);
    }

    document.getElementById('input-cantidad').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') { guardarCantidadModal(); }
    });

    function borrarTalla(talla) {
        resultados = resultados.filter(r => r.talla !== talla);
        enviarAvance();
        renderTallas();
    }

    async function enviarAvance() {
        const porc = Math.round((resultados.length / inventarioActivo.totalTallas) * 100);
        fetch('/api/actualizar-progreso', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: inventarioActivo.id, progreso: porc, conteoActual: resultados.length, resultados: resultados })
        });
    }

    function actualizarProgresoVisual() {
        const porc = Math.round((resultados.length / inventarioActivo.totalTallas) * 100);
        document.getElementById('bar-progreso').style.width = porc + "%";
        document.getElementById('texto-progreso').innerText = `Progreso: ${porc}%`;
        document.getElementById('contador-tallas').innerText = `${resultados.length}/${inventarioActivo.totalTallas}`;
    }

    // ==============================================================
    // LÓGICA DE FAKE LOADER PARA OPERADOR
    // ==============================================================
    const fakeLoader = {
        overlay: document.getElementById('fake-loader-overlay'),
        msg: document.getElementById('fake-loader-msg'),
        perc: document.getElementById('fake-loader-perc'),
        status: document.getElementById('fake-loader-status'),
        interval: null,

        show: function(title) {
            this.msg.innerText = title;
            this.perc.innerText = "0%";
            this.status.innerText = "Sincronizando con el Supervisor";
            this.overlay.classList.add('show');
            setTimeout(() => this.overlay.classList.add('animating'), 50);

            let p = 0;
            this.interval = setInterval(() => {
                p++;
                this.perc.innerText = p + "%";
                if (p === 70) this.status.innerText = "Cerrando registro...";
                if (p === 90) this.status.innerText = "Enviando notificación...";
                if (p >= 100) clearInterval(this.interval);
            }, 60); 
        },

        hide: function() {
            this.overlay.classList.remove('animating');
            this.overlay.classList.remove('show');
            clearInterval(this.interval);
        }
    };

    async function finalizarInventario() {
        if (resultados.length < inventarioActivo.totalTallas) {
            if (!confirm("Aún faltan tallas por contar. ¿Estás seguro de enviar el reporte incompleto?")) return;
        }
        
        // 1. Mostrar la animación Premium circular
        fakeLoader.show("Enviando reporte ciclico...");
        
        const ahora = new Date();
        const horaFinStr = ahora.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        // 2. Realizar la petición real al servidor en segundo plano
        const res = await fetch('/api/actualizar-progreso', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: inventarioActivo.id, progreso: 100, conteoActual: resultados.length, resultados: resultados, horaFin: horaFinStr, estatus: "Finalizado" })
        });
        
        // 3. Esperamos a que la animación termine sus ~6 segundos
        await new Promise(resolve => setTimeout(resolve, 6200));
        
        // 4. Estallido de Confeti y mensaje de éxito
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#FF8C00', '#001A33', '#C5A059'] });
        fakeLoader.msg.innerText = "¡Reporte Enviado! ✅";
        fakeLoader.perc.innerText = "100%";
        fakeLoader.status.innerText = "Regresando al menú principal...";

        // 5. Esperamos 1.5s para que disfruten el éxito y recargamos
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        if (res.ok) { 
            document.body.style.backgroundColor = 'var(--bg-apple)'; // Restaurar color original
            location.reload(); 
        }
    }
</script>
