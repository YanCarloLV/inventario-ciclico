<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Supervisor Pro - Intelligence</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-navy: #001A33;
            --brand-gold: #C5A059;
            --brand-orange: #FF8C00;
            --bg-body: #F4F7F6;
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        body { 
            font-family: 'Plus Jakarta Sans', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-body); margin: 0; padding: 0 0 40px 0; color: var(--text-main); 
        }

        /* Animación Suave */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* Header Centralizado */
        .top-header {
            background: var(--brand-navy);
            text-align: center;
            padding: 25px 20px;
            margin-bottom: 40px;
            border-bottom: 4px solid var(--brand-orange);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .logo-wrap {
            background: white;
            display: inline-block;
            padding: 12px 35px;
            border-radius: 40px;
            box-shadow: 0 4px 20px rgba(255, 140, 0, 0.3);
        }
        .logo-wrap img { max-height: 70px; vertical-align: middle; }

        .container { max-width: 1200px; margin: auto; padding: 0 20px; }

        /* Tarjetas Premium */
        .card { 
            background: white; padding: 35px; border-radius: 24px; 
            box-shadow: var(--card-shadow); margin-bottom: 30px; 
            border: 1px solid rgba(0,0,0,0.03);
        }
        .card-historial { border-top: 5px solid #8E8E93; }

        h2 { font-size: 22px; color: var(--brand-navy); margin-top: 0; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        h2::before { content: ""; width: 5px; height: 22px; background: var(--brand-gold); border-radius: 5px; }
        
        /* Formulario Layout */
        .form-main { display: flex; flex-direction: column; gap: 20px; }
        .row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        select { 
            width: 100%; padding: 16px; border: 2px solid #E5E5EA; border-radius: 14px; 
            font-size: 15px; outline: none; transition: 0.3s; background: #F9F9FB;
            font-family: inherit; font-weight: 600; color: var(--brand-navy);
        }
        select:focus { border-color: var(--brand-navy); background: white; }
        
        /* Tallas Grid */
        .tallas-grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 10px; }
        .talla-col { background: #F9F9FB; border: 1px solid #E5E5EA; border-radius: 16px; overflow: hidden; }
        .col-header { padding: 18px; border-bottom: 1px solid #E5E5EA; }
        .col-circle { 
            width: 40px; height: 40px; background: var(--brand-navy); color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            margin: 0; font-weight: 800; font-size: 16px; box-shadow: 0 4px 10px rgba(0,26,51,0.2);
        }
        
        .sizes-list { max-height: 300px; overflow-y: auto; padding: 10px 15px; }
        .size-item { display: flex; align-items: center; gap: 15px; padding: 12px 10px; border-bottom: 1px solid #EDEDF2; font-size: 15px; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .size-item:hover { background: white; border-radius: 10px; }
        
        /* Checkboxes iOS Style */
        .toggle-ios {
            appearance: none; width: 42px; height: 24px; background: #D2D2D7; border-radius: 20px;
            position: relative; cursor: pointer; outline: none; transition: 0.3s; margin: 0; display: inline-block; vertical-align: middle;
        }
        .toggle-ios::after {
            content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;
            background: white; border-radius: 50%; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .toggle-ios:checked { background: #34C759; }
        .toggle-ios:checked::after { transform: translateX(18px); }

        /* Botones Pro */
        .btn { 
            padding: 14px 28px; border: none; border-radius: 14px; cursor: pointer; 
            font-weight: 800; font-size: 14px; transition: 0.3s; display: inline-flex; 
            align-items: center; gap: 8px; justify-content: center; font-family: inherit;
        }
        .btn-add { background: var(--brand-navy); color: white; font-size: 16px; width: 100%; margin-top: 15px; padding: 18px; }
        .btn-add:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,26,51,0.2); }
        .btn-refresh { background: #E8F2FF; color: #007AFF; }
        .btn-dl { background: var(--brand-gold); color: white; text-decoration: none; }
        .btn-danger { background: #FFEBEB; color: #FF3B30; }
        .btn-delete-hist { background: #FF3B30; color: white; border-radius: 8px; padding: 8px 14px; font-size: 12px; }

        /* Tablas Premium */
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px; background: white; }
        th { background: white; color: var(--text-muted); text-align: left; padding: 20px 15px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #E5E5EA; }
        td { padding: 18px 15px; border-bottom: 1px solid #F2F2F7; font-size: 15px; font-weight: 500; transition: background 0.2s; }
        
        /* Hover 3D en Filas */
        tbody tr { transition: all 0.2s ease; border-radius: 12px; }
        tbody tr:hover td { background: #F9F9FB; cursor: default; }
        tbody tr:hover td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        tbody tr:hover td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        
        .status { padding: 6px 14px; border-radius: 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; display: inline-flex; align-items: center; }
        .proc { background: #E8F2FF; color: #007AFF; }
        .pen { background: #F2F2F7; color: var(--text-muted); }
        
        /* Indicador Live Pulsante */
        .pulse-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #007AFF;
            margin-right: 8px; box-shadow: 0 0 0 0 rgba(0,122,255,0.7); animation: pulseDot 1.5s infinite;
        }
        @keyframes pulseDot { 70% { box-shadow: 0 0 0 8px rgba(0,122,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,122,255,0); } }

        /* Barra de Progreso */
        .prog-container { width: 130px; margin-top: 8px; }
        .prog-bg { background: #E5E5EA; height: 8px; border-radius: 10px; overflow: hidden; }
        .prog-fill { background: var(--brand-orange); height: 100%; transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .prog-text { font-size: 11px; font-weight: 800; color: var(--brand-navy); margin-top: 5px; display: block; }

        /* Filtro */
        .filter-section { background: #F9F9FB; padding: 18px; border-radius: 16px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; border: 1px solid #E5E5EA; }
        .filter-section select { width: auto; min-width: 250px; border: 1px solid #D2D2D7; }
        
        /* Contenedor de Toasts */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast {
            background: white; border-left: 5px solid var(--brand-navy); padding: 18px 25px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); font-weight: 700; font-size: 14px; color: var(--brand-navy);
            animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; pointer-events: auto;
        }
        .toast.success { border-color: #34C759; }
        .toast.warning { border-color: var(--brand-orange); }
        .toast.fade-out { animation: fadeOutRight 0.4s ease forwards; }
        
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

        /* Scrollbar Apple */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #D2D2D7; border-radius: 10px; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="top-header">
    <div class="logo-wrap">
        <img src="/logo.png" alt="Logo Empresa">
    </div>
</div>

<div class="container">
    <div class="card reveal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
            <h2>Nuevo Inventario Ciclico</h2>
            <label class="btn btn-dl" style="cursor:pointer; font-size: 13px; font-weight: 800;">
                📂 Importar Excel
                <input type="file" id="excelInput" accept=".xlsx, .xls" style="display:none;" onchange="procesarExcel(this)">
            </label>
        </div>

        <div class="form-main">
            <div class="row-inputs">
                <div>
                    <label>Modelo del Producto</label>
                    <select id="mod" onchange="actualizarColoresSegunModelo()">
                        <option value="" disabled selected>Seleccione el modelo...</option>
                    </select>
                </div>
                <div>
                    <label>Variante de Color</label>
                    <select id="col">
                        <option value="" disabled selected>Seleccione el color...</option>
                    </select>

            </div>

            <label style="margin-top: 10px;">Tallas a Inventariar:</label>
            <div class="tallas-grid-container">
                <div class="talla-col">
                    <div class="col-header">
                        <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
                            <div class="col-circle">C</div>
                            <span style="font-weight: 600; font-size: 16px; color: var(--brand-navy);">corto</span>
                        </div>
                        <label style="font-size:12px; color: var(--brand-navy); margin: 10px 0 0 0; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" class="toggle-ios" onchange="toggleGroup('C', this.checked)"> Seleccionar Todos
                        </label>
                    </div>
                    <div id="list-C" class="sizes-list"></div>
                </div>
                <div class="talla-col">
                    <div class="col-header">
                        <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
                            <div class="col-circle" style="background:var(--text-muted)">R</div>
                            <span style="font-weight: 600; font-size: 16px; color: var(--brand-navy);">regular</span>
                        </div>
                        <label style="font-size:12px; color: var(--brand-navy); margin: 10px 0 0 0; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" class="toggle-ios" onchange="toggleGroup('R', this.checked)"> Seleccionar Todos
                        </label>
                    </div>
                    <div id="list-R" class="sizes-list"></div>
                </div>
                <div class="talla-col">
                    <div class="col-header">
                        <div style="display: flex; align-items: center; gap: 10px; justify-content: center;">
                            <div class="col-circle" style="background:var(--brand-orange)">L</div>
                            <span style="font-weight: 600; font-size: 16px; color: var(--brand-navy);">Largo</span>
                        </div>
                        <label style="font-size:12px; color: var(--brand-navy); margin: 10px 0 0 0; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;">
                            <input type="checkbox" class="toggle-ios" onchange="toggleGroup('L', this.checked)"> Seleccionar Todos
                        </label>
                    </div>
                    <div id="list-L" class="sizes-list"></div>
                </div>
            </div>

            <button class="btn btn-add" onclick="crearCiclico()">✅ PUBLICAR INVENTARIO EN APP</button>
        </div>
    </div>

    <div class="card reveal" style="animation-delay: 0.1s;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2>Monitoreo en Tiempo Real</h2>
            <button class="btn btn-refresh" onclick="cargarDatos()">🔄 Refrescar Datos</button>
        </div>
        <table id="tablaActivos">
            <thead>
                <tr>
                    <th>Folio</th>
                    <th>Modelo y Color</th>
                    <th>Estado / Avance</th>
                    <th>Operador</th>
                    <th>Inicio</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card card-historial reveal" style="animation-delay: 0.2s;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
            <h2 style="color: var(--text-muted);">Historial de Inventarios Finalizados</h2>
            <button class="btn btn-danger" onclick="eliminarTodoElHistorial()">⚠️ Borrar Todo el Historial</button>
        </div>

        <div class="filter-section">
            <label style="margin:0;">📅 Filtro de Fecha:</label>
            <select id="filtroFecha" onchange="cargarDatos()">
                <option value="HOY">Ver solo registros de HOY (Monterrey)</option>
                <option value="TODOS">Ver registros históricos completos</option>
            </select>
        </div>

        <table id="tablaHistorial">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Modelo/Color</th>
                    <th>Operador</th>
                    <th>Tiempo Total</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

        toast.innerHTML = `${icono} ${mensaje}`;
        container.appendChild(toast);
        
        setTimeout(() => {
            toast.classList.add('fade-out');
            setTimeout(() => toast.remove(), 400);
        }, 3500);
    }

    modelosEspeciales.forEach(m => {
        coloresEspeciales.forEach(c => {
            catalogoProductos.push({ modelo: m, color: c });
        });
    });

    function cargarCatalogo() {
        const modSelect = document.getElementById('mod');
        modSelect.innerHTML = '<option value="" disabled selected>Seleccione el modelo...</option>';
        const modelosUnicos = [...new Set(catalogoProductos.map(p => p.modelo))];
        modelosUnicos.sort().forEach(m => { modSelect.innerHTML += `<option value="${m}">${m}</option>`; });
    }

    function actualizarColoresSegunModelo() {
        const modeloSelected = document.getElementById('mod').value;
        const colSelect = document.getElementById('col');
        colSelect.innerHTML = '<option value="" disabled selected>Seleccione el color...</option>';
        catalogoProductos.filter(p => p.modelo === modeloSelected).forEach(p => {
            colSelect.innerHTML += `<option value="${p.color}">${p.color}</option>`;
        });
    }

    const tallasBase = [36, 38, 40, 42, 44, 46, 48, 50, 52, 54, 56, 58, 60, 62, 64];
    function renderTallas() {
        ['C', 'R', 'L'].forEach(cat => {
            document.getElementById(`list-${cat}`).innerHTML = tallasBase.map(t => `
                <label class="size-item">
                    <input type="checkbox" class="toggle-ios check-${cat}" value="${t}${cat}"> 
                    <span>${t}${cat}</span>
                </label>
            `).join('');
        });
    }

    function toggleGroup(cat, isChecked) {
        document.querySelectorAll(`.check-${cat}`).forEach(cb => cb.checked = isChecked);
    }

    function obtenerFechaHoyMonterrey() {
        const d = new Date();
        const dia = d.toLocaleDateString('es-MX', {timeZone: 'America/Monterrey', day: '2-digit'});
        const mes = d.toLocaleDateString('es-MX', {timeZone: 'America/Monterrey', month: '2-digit'});
        const anio = d.toLocaleDateString('es-MX', {timeZone: 'America/Monterrey', year: 'numeric'});
        return `${dia}/${mes}/${anio}`;
    }

    function calcularDiferenciaTiempo(inicio, fin) {
        if (!inicio || !fin) return "00:00:00";
        try {
            const parsear = (str) => {
                const [time, mod] = str.split(' ');
                let [h, m, s] = time.split(':');
                if (h === '12') h = '00';
                if (mod === 'PM') h = parseInt(h, 10) + 12;
                const d = new Date();
                d.setHours(h, m, s, 0);
                return d.getTime();
            };
            let diff = parsear(fin) - parsear(inicio);
            if (diff < 0) diff += 86400000;
            const segs = Math.floor(diff / 1000);
            return new Date(segs * 1000).toISOString().substr(11, 8);
        } catch (e) { return "---"; }
    }

    async function cargarDatos() {
        try {
            const res = await fetch('/api/ciclicos');
            const listado = await res.json();
            
            const filtro = document.getElementById('filtroFecha').value;
            const hoyRef = obtenerFechaHoyMonterrey();

            const activosBody = document.querySelector("#tablaActivos tbody");
            const historialBody = document.querySelector("#tablaHistorial tbody");
            activosBody.innerHTML = ""; historialBody.innerHTML = "";

            window.datosGlobales = listado;

            listado.forEach(c => {
                if (c.estatus !== 'Finalizado') {
                    // Magia del punto Live pulsante
                    const indicadorLive = c.estatus === 'En Proceso' ? `<span class="pulse-dot"></span>` : '';
                    
                    activosBody.innerHTML += `
                        <tr class="reveal">
                            <td><b style="color:var(--brand-navy);">#${c.id}</b></td>
                            <td><b style="color:var(--brand-navy);">${c.modelo}</b><br><small style="color:var(--text-muted);">${c.color}</small></td>
                            <td>
                                <span class="status ${c.estatus === 'En Proceso' ? 'proc' : 'pen'}">${indicadorLive}${c.estatus}</span>
                                ${c.estatus === 'En Proceso' ? `
                                    <div class="prog-container">
                                        <div class="prog-bg"><div class="prog-fill" style="width:${c.progreso}%"></div></div>
                                        <span class="prog-text">${c.progreso}% completado</span>
                                    </div>` : ''}
                            </td>
                            <td><b>${c.asignadoA || 'Sin asignar'}</b></td>
                            <td><small>${c.horaInicio || '--:--'}</small></td>
                            <td>
                                ${c.estatus === 'En Proceso' ? `<button class="btn btn-danger" style="padding:8px 12px; font-size:11px;" onclick="liberarInventario('${c.id}')">🔓 Liberar</button>` : '---'}
                            </td>
                        </tr>`;
                } else {
                    if (filtro === "HOY" && c.fecha !== hoyRef) return;
                    const tTotal = calcularDiferenciaTiempo(c.horaInicio, c.horaFin);

                    historialBody.innerHTML += `
                        <tr class="reveal">
                            <td><small><b>#${c.id}</b></small></td>
                            <td>${c.fecha}</td>
                            <td><b style="color:var(--brand-navy);">${c.modelo}</b> - <small>${c.color}</small></td>
                            <td><b>${c.asignadoA}</b></td>
                            <td><b style="color:var(--brand-orange);">${tTotal}</b></td>
                            <td>
                                <button class="btn btn-dl" style="padding:8px 14px; font-size:12px;" onclick="descargarCSV('${c.id}')">📥 Descargar CSV</button>
                                <button class="btn btn-delete-hist" onclick="eliminarFila('${c.id}')">🗑️ Eliminar</button>
                            </td>
                        </tr>`;
                }
            });
        } catch (err) { console.error("Error cargando tabla:", err); }
    }

    async function crearCiclico() {
        const modelo = document.getElementById('mod').value;
        const color = document.getElementById('col').value;
        const seleccionadas = Array.from(document.querySelectorAll('.sizes-list input[type="checkbox"]:checked')).map(cb => cb.value);
        
        if(!modelo || !color || seleccionadas.length === 0) {
            showToast("Por favor completa Modelo, Color y Tallas.", "warning");
            return;
        }
        
        const res = await fetch('/api/crear-ciclico', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ modelo, color, tallasRaw: seleccionadas.join(', ') })
        });
        
        if(res.ok) { 
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            cargarDatos();
            showToast("Inventario publicado correctamente en la App.");
        }
    }

    async function liberarInventario(id) {
        if(confirm("¿Deseas desbloquear este inventario para que otro operador pueda tomarlo?")) {
            await fetch('/api/liberar-inventario', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ id }) 
            });
            cargarDatos();
            showToast("Inventario liberado exitosamente.");
        }
    }

    async function eliminarFila(id) {
        if(!confirm(`¿Eliminar definitivamente el registro ${id}?`)) return;
        await fetch(`/api/eliminar-ciclico/${encodeURIComponent(id)}`, { method: 'DELETE' });
        cargarDatos();
        showToast("Registro eliminado del historial.");
    }

    async function eliminarTodoElHistorial() {
        if(!confirm("⚠️ ATENCIÓN: Se borrarán TODOS los registros finalizados de la base de datos. ¿Continuar?")) return;
        const res = await fetch('/api/eliminar-todos-finalizados', { method: 'DELETE' });
        const data = await res.json();
        showToast(`Limpieza exitosa. Se borraron ${data.conteo} registros.`);
        cargarDatos();
    }

    function descargarCSV(folio) {
        const item = window.datosGlobales.find(i => i.id === folio);
        if(!item) {
            showToast("Error: No se encontró la información del inventario.", "warning");
            return;
        }
        const tFinal = calcularDiferenciaTiempo(item.horaInicio, item.horaFin);
        let contenidoCsv = "\uFEFFID,Fecha,Modelo,Color,Operador,Talla,Cantidad,Tiempo Total\n";
        item.resultados.forEach(r => {
            contenidoCsv += `"${item.id}","${item.fecha}","${item.modelo}","${item.color}","${item.asignadoA}","${r.talla}","${r.cantidad}","${tFinal}"\n`;
        });
        const blob = new Blob([contenidoCsv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Reporte_Ciclico_${item.modelo}_${item.fecha.replace(/\//g, '-')}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showToast("Descarga iniciada.");
    }

    function procesarExcel(input) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const grupos = {};
            rows.forEach(r => {
                const k = `${r.Modelo}-${r.Color}`;
                if(!grupos[k]) grupos[k] = { m: r.Modelo, c: r.Color, t: [] };
                grupos[k].t.push(r.Talla);
            });
            for(let k in grupos) {
                const g = grupos[k];
                await fetch('/api/crear-ciclico', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ modelo: g.m, color: g.c, tallasRaw: g.t.join(', ') }) 
                });
            }
            showToast("Excel procesado y publicado con éxito."); 
            cargarDatos();
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    cargarCatalogo(); 
    renderTallas(); 
    cargarDatos();
    setInterval(cargarDatos, 8000);
</script>
