<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Supervisor Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; margin-top: 0; }
        
        /* Formulario Layout */
        .form-main { display: flex; flex-direction: column; gap: 20px; }
        .row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #7f8c8d; margin-bottom: 8px; }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; }
        
        /* Columnas de Tallas (Regla Estricta) */
        .tallas-grid-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .talla-col { background: white; border: 1px solid #e0e6ed; border-radius: 12px; overflow: hidden; }
        .col-header { background: #f8f9fa; padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .col-circle { width: 30px; height: 30px; background: #6c5ce7; color: white; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 5px; }
        .sizes-list { max-height: 350px; overflow-y: auto; padding: 10px; }
        .size-item { display: flex; align-items: center; gap: 10px; padding: 6px; border-bottom: 1px solid #f1f1f1; font-size: 13px; }

        /* Botones */
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background: #3498db; color: white; width: 100%; font-size: 16px; margin-top: 15px; }
        .btn-dl { background: #27ae60; color: white; font-size: 11px; }
        .btn-liberar { background: #e74c3c; color: white; font-size: 10px; padding: 5px 8px; margin-left: 5px; }

        /* Tabla y Progreso */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #f8f9fa; }

        /* Barra de Progreso en Tabla */
        .progress-mini-bg { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; width: 100px; margin-top: 4px; }
        .progress-mini-fill { background: #3498db; height: 100%; transition: 0.5s; }
        
        .status { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .fin { background: #d4edda; color: #155724; }
        .proc { background: #e3f2fd; color: #0d47a1; }
        .pen { background: #f5f5f5; color: #616161; }

        /* Animación de Resaltado (Highlight) */
        @keyframes highlightNew {
            0% { background-color: #fff3cd; }
            100% { background-color: transparent; }
        }
        .new-row { animation: highlightNew 4s ease-out; border-left: 5px solid #ffc107; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom:20px;"><img src="/logo.png" style="max-height:80px;"></div>
    
    <h1>🛡️ Panel de Supervisión</h1>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>➕ Crear Inventario</h2>
            <label class="btn btn-dl" style="cursor:pointer;">📥 Excel <input type="file" id="excelInput" accept=".xlsx, .xls" style="display:none;" onchange="procesarExcel(this)"></label>
        </div>
        
        <div class="form-main">
            <div class="row-inputs">
                <div><label>Modelo</label><select id="mod">
                    <option value="" disabled selected>Selecciona...</option>
                    <option value="33739">33739</option><option value="4030">4030</option>
                    <option value="4040">4040</option><option value="TR-1">TR-1</option>
                </select></div>
                <div><label>Color</label><select id="col">
                    <option value="" disabled selected>Selecciona...</option>
                    <option value="AZUL">AZUL</option><option value="NEGRO">NEGRO</option>
                    <option value="VINO">VINO</option>
                </select></div>
            </div>

            <div class="tallas-grid-container">
                <div class="talla-col">
                    <div class="col-header"><div class="col-circle">C</div><br><input type="checkbox" onchange="toggleGroup('C', this.checked)"> Todos</div>
                    <div id="list-C" class="sizes-list"></div>
                </div>
                <div class="talla-col">
                    <div class="col-header"><div class="col-circle" style="background:#4834d4">R</div><br><input type="checkbox" onchange="toggleGroup('R', this.checked)"> Todos</div>
                    <div id="list-R" class="sizes-list"></div>
                </div>
                <div class="talla-col">
                    <div class="col-header"><div class="col-circle" style="background:#eb4d4b">L</div><br><input type="checkbox" onchange="toggleGroup('L', this.checked)"> Todos</div>
                    <div id="list-L" class="sizes-list"></div>
                </div>
            </div>
            <button class="btn btn-add" onclick="crearCiclico()">🚀 Publicar Inventario</button>
        </div>
    </div>

    <div class="card" id="seccion-monitor">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>📊 Monitor en Tiempo Real</h2>
            <button class="btn" style="background:#eee" onclick="cargarDatos()">🔄 Refrescar</button>
        </div>
        <table id="tabla">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Modelo/Color</th>
                    <th>Estado / Progreso</th>
                    <th>Operador</th>
                    <th>Tiempos</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let datos = [];
    let ultimoIdCreado = null;
    const tallasBase = [36, 38, 40, 42, 44, 46, 48, 50, 52, 54, 56, 58, 60, 62, 64];

    function renderTallas() {
        ['C', 'R', 'L'].forEach(cat => {
            const container = document.getElementById(`list-${cat}`);
            container.innerHTML = tallasBase.map(t => `
                <label class="size-item"><input type="checkbox" class="check-${cat}" value="${t}${cat}"> ${t}</label>
            `).join('');
        });
    }

    function toggleGroup(cat, isChecked) {
        document.querySelectorAll(`.check-${cat}`).forEach(cb => cb.checked = isChecked);
    }

    async function cargarDatos() {
        const res = await fetch('/api/ciclicos');
        const listado = await res.json();
        datos = listado.sort((a, b) => b.id - a.id);

        const cuerpo = document.querySelector("#tabla tbody");
        cuerpo.innerHTML = "";

        datos.forEach(c => {
            const isNew = c.id === ultimoIdCreado ? 'class="new-row"' : '';
            const porcentaje = c.progreso || 0;
            
            cuerpo.innerHTML += `
                <tr ${isNew}>
                    <td><b>#${c.id}</b></td>
                    <td>${c.modelo}<br><small>${c.color}</small></td>
                    <td>
                        <span class="status ${c.estatus === 'Finalizado' ? 'fin' : (c.estatus === 'En Proceso' ? 'proc' : 'pen')}">
                            ${c.estatus}
                        </span>
                        ${c.estatus === 'En Proceso' ? `
                            <div class="progress-mini-bg"><div class="progress-mini-fill" style="width:${porcentaje}%"></div></div>
                            <small>${porcentaje}%</small>
                        ` : ''}
                    </td>
                    <td>
                        ${c.asignadoA || '---'}
                        ${c.estatus === 'En Proceso' ? `<button class="btn-liberar" onclick="liberarInventario(${c.id})">🔓 Liberar</button>` : ''}
                    </td>
                    <td><small>In: ${c.horaInicio || '--'}<br>Fin: ${c.horaFin || '--'}</small></td>
                    <td>
                        ${c.estatus === 'Finalizado' ? `<button class="btn btn-dl" onclick="descargarExcel(${c.id})">📥 Excel</button>` : '⌛'}
                    </td>
                </tr>
            `;
        });
    }

    async function crearCiclico() {
        const modelo = document.getElementById('mod').value;
        const color = document.getElementById('col').value;
        const seleccionadas = Array.from(document.querySelectorAll('.sizes-list input[type="checkbox"]:checked')).map(cb => cb.value);

        if(!modelo || !color || seleccionadas.length === 0) return alert("Faltan datos");

        const res = await fetch('/api/crear-ciclico', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ modelo, color, tallasRaw: seleccionadas.join(', ') })
        });

        if(res.ok) {
            const nuevo = await res.json();
            ultimoIdCreado = nuevo.id;
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            await cargarDatos();
            document.getElementById('seccion-monitor').scrollIntoView({ behavior: 'smooth' });
        }
    }

    async function liberarInventario(id) {
        if(!confirm("¿Deseas liberar este inventario? El operador actual podrá ser desplazado.")) return;
        await fetch('/api/liberar-inventario', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id })
        });
        cargarDatos();
    }

    // Funciones de Excel (Mantener igual que antes)
    function descargarExcel(id) {
        const c = datos.find(item => item.id === id);
        let csv = "ID,Modelo,Color,Operador,Talla,Cantidad,Inicio,Fin\n";
        c.resultados.forEach(r => {
            csv += `${c.id},${c.modelo},${c.color},${c.asignadoA},${r.talla},${r.cantidad},${c.horaInicio},${c.horaFin}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Reporte_${c.modelo}.csv`;
        link.click();
    }

    renderTallas();
    cargarDatos();
    setInterval(cargarDatos, 5000); // Actualización cada 5 segundos para ver las barritas moverse
</script>
</body>
</html>
