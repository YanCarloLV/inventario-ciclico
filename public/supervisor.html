<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Gestión de Inventarios</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #F5F5F7;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-dark: #1D1D1F;
            --text-gray: #86868B;
            --accent-blue: #0071E3;
            --success-green: #34C759;
            --danger-red: #FF3B30;
            --border-light: #D2D2D7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            letter-spacing: -0.01em;
            padding: 40px;
        }

        /* Animación suave */
        @keyframes reveal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { animation: reveal 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        /* Header Principal */
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; border-bottom: 1px solid var(--border-light);
            padding-bottom: 20px;
        }

        .header-logo { display: flex; align-items: center; gap: 15px; }
        .header-logo img { height: 35px; width: auto; }
        .header-logo h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.8px; }

        /* Sistema de Tarjetas macOS */
        .apple-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .apple-card h2 { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .apple-card h2::before { content: ""; width: 4px; height: 18px; background: var(--accent-blue); border-radius: 2px; }

        /* Layout Formulario */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .input-box label { display: block; font-size: 13px; font-weight: 600; color: var(--text-gray); margin-bottom: 8px; }

        select, input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 1px solid var(--border-light); background: #FFF;
            font-size: 15px; outline: none; transition: 0.2s;
        }
        select:focus { border-color: var(--accent-blue); background: white; }

        /* Tallas Columns */
        .talla-flex { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .talla-group { background: #FBFBFD; padding: 18px; border-radius: 16px; border: 1px solid #F0F0F0; }
        .talla-group h4 { font-size: 12px; font-weight: 700; color: var(--text-gray); margin-bottom: 15px; text-align: center; text-transform: uppercase; }
        
        .checks-container { max-height: 180px; overflow-y: auto; }
        .check-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 14px; font-weight: 500; cursor: pointer; }
        .check-item input { transform: scale(1.2); cursor: pointer; }

        /* Botones Apple */
        .v-btn {
            padding: 12px 24px; border-radius: 12px; font-weight: 600;
            border: none; cursor: pointer; transition: 0.2s;
            display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .v-btn-primary { background: #1D1D1F; color: white; }
        .v-btn-primary:hover { background: #000; transform: translateY(-1px); }
        .v-btn-outline { background: white; border: 1px solid var(--border-light); color: var(--text-dark); }
        .v-btn-outline:hover { background: #F5F5F7; }

        /* Tablas macOS */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-gray); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #E5E5E7; }
        td { padding: 18px 15px; border-bottom: 1px solid #F0F0F0; font-size: 14px; color: var(--text-dark); }
        tr:last-child td { border-bottom: none; }

        /* Status & Progress */
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .bg-proc { background: #E8F2FF; color: var(--accent-blue); }
        .bg-pen { background: #F5F5F7; color: var(--text-gray); }

        .progress-pill { width: 90px; height: 6px; background: #E5E5E7; border-radius: 3px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: var(--accent-blue); border-radius: 3px; }

        /* Filtros y Controles Historial */
        .controls-hist { display: flex; gap: 15px; align-items: center; }
        .apple-select-mini { width: auto; min-width: 220px; padding: 10px 14px; border-radius: 10px; font-weight: 500; }
    </style>
</head>
<body>

<header>
    <div class="header-logo">
        <img src="/logo.png" alt="Empresa Logo">
        <h1>Centro de Control</h1>
    </div>
    <div style="display: flex; gap: 10px;">
        <label class="v-btn v-btn-outline" style="cursor:pointer; font-size: 13px;">
            📂 Importar desde Excel
            <input type="file" id="excelInput" style="display:none" onchange="procesarExcel(this)">
        </label>
        <button class="v-btn v-btn-primary" onclick="cargarDatos()">🔄 Sincronizar</button>
    </div>
</header>

<div class="container">
    <div class="apple-card reveal">
        <h2>Crear Nuevo Ciclo de Inventario</h2>
        <div class="form-grid">
            <div class="input-box">
                <label>Modelo del Producto</label>
                <select id="mod" onchange="actualizarColoresSegunModelo()"></select>
            </div>
            <div class="input-box">
                <label>Color / Variante</label>
                <select id="col"></select>
            </div>
        </div>

        <div class="talla-flex">
            <div class="talla-group">
                <h4>Short (C)</h4>
                <label class="check-item"><input type="checkbox" onchange="toggleGroup('C', this.checked)"> <small style="color:var(--text-gray)">Todo</small></label>
                <div id="list-C" class="checks-container"></div>
            </div>
            <div class="talla-group">
                <h4>Regular (R)</h4>
                <label class="check-item"><input type="checkbox" onchange="toggleGroup('R', this.checked)"> <small style="color:var(--text-gray)">Todo</small></label>
                <div id="list-R" class="checks-container"></div>
            </div>
            <div class="talla-group">
                <h4>Long (L)</h4>
                <label class="check-item"><input type="checkbox" onchange="toggleGroup('L', this.checked)"> <small style="color:var(--text-gray)">Todo</small></label>
                <div id="list-L" class="checks-container"></div>
            </div>
        </div>
        <button class="v-btn v-btn-primary" style="width:100%; margin-top:30px; justify-content:center; font-size: 16px;" onclick="crearCiclico()">✓ PUBLICAR EN LA APP</button>
    </div>

    <div class="apple-card reveal">
        <h2>Inventarios en Curso (Tiempo Real)</h2>
        <table id="tablaActivos">
            <thead>
                <tr>
                    <th>Folio ID</th>
                    <th>Producto</th>
                    <th>Avance</th>
                    <th>Responsable</th>
                    <th>Hora Inicio</th>
                    <th>Gestión</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="apple-card reveal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2>Historial de Inventarios Finalizados</h2>
            <div class="controls-hist">
                <select id="filtroFecha" onchange="cargarDatos()" class="apple-select-mini">
                    <option value="HOY">Ver solo registros de HOY</option>
                    <option value="TODOS">Ver Todo el Historial</option>
                </select>
                <button class="v-btn" style="padding:10px; background:#FFEBEB; color:var(--danger-red); border-radius:10px;" onclick="eliminarTodoElHistorialMasivo()">🗑️ Purgar Todo</button>
            </div>
        </div>
        <table id="tablaHistorial">
            <thead>
                <tr>
                    <th>Folio ID</th>
                    <th>Fecha</th>
                    <th>Producto</th>
                    <th>Operador</th>
                    <th>Duración Total</th>
                    <th>Reporte</th>
                    <th>Eliminar</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

    // --- CARGA DE SELECTORES ---
    function cargarCatalogo() {
        const modSelect = document.getElementById('mod');
        modSelect.innerHTML = '<option value="" disabled selected>Seleccione...</option>';
        const modelosUnicos = [...new Set(catalogoProductos.map(p => p.modelo))];
        modelosUnicos.sort().forEach(m => { modSelect.innerHTML += `<option value="${m}">${m}</option>`; });
    }

    function actualizarColoresSegunModelo() {
        const modeloSelected = document.getElementById('mod').value;
        const colSelect = document.getElementById('col');
        colSelect.innerHTML = '<option value="" disabled selected>Seleccione...</option>';
        catalogoProductos.filter(p => p.modelo === modeloSelected).forEach(p => {
            colSelect.innerHTML += `<option value="${p.color}">${p.color}</option>`;

    // --- TALLAS GRID ---

            document.getElementById(`list-${cat}`).innerHTML = tallasBase.map(t => `
                <label class="check-item"><input type="checkbox" class="check-${cat}" value="${t}${cat}"> ${t}${cat}</label>

    function toggleGroup(cat, isChecked) { document.querySelectorAll(`.check-${cat}`).forEach(cb => cb.checked = isChecked); }

    // ==========================================
    // LÓGICA DE TIEMPOS Y FECHAS MONTERREY
    // ==========================================
    function obtenerFechaHoyMonterrey() {
        return new Intl.DateTimeFormat('es-MX', {timeZone: 'America/Monterrey', day: '2-digit', month: '2-digit', year: 'numeric'}).format(new Date());
    }

    function calcularDuracionTotal(inicio, fin) {
        if (!inicio || !fin) return "00:00:00";
        try {
            const parseHoraToMillis = (str) => {
                const [time, modifier] = str.split(' ');
                let [hours, minutes, seconds] = time.split(':');
                if (hours === '12') hours = '00';
                if (modifier === 'PM') hours = parseInt(hours, 10) + 12;
                const date = new Date(); date.setHours(hours, minutes, seconds, 0);
                return date.getTime();
            };
            const diffMillis = parseHoraToMillis(fin) - parseHoraToMillis(inicio);
            if (diffMillis < 0) diffMillis += 86400000; // Cruzó medianoche
            const totalSegundos = Math.floor(diffMillis / 1000);
            return new Date(totalSegundos * 1000).toISOString().substr(11, 8);
        } catch (e) { return "---"; }
    }

    // ==========================================
    // GESTIÓN DE DATOS (CRUD Y MONITOREO)
    // ==========================================
    async function cargarDatos() {
        try {
            const res = await fetch('/api/ciclicos');
            const listado = await res.json();
            const filtro = document.getElementById('filtroFecha').value;
            const hoyMexico = obtenerFechaHoyMonterrey();

            const activosBody = document.querySelector("#tablaActivos tbody");
            const historialBody = document.querySelector("#tablaHistorial tbody");
            activosBody.innerHTML = ""; historialBody.innerHTML = "";
            window.datosGlobales = listado; // Guardar global para CSV

            listado.forEach(c => {
                if (c.estatus !== 'Finalizado') {
                    // TABLA ACTIVOS
                    activosBody.innerHTML += `
                        <tr>
                            <td><b>${c.id}</b></td>
                            <td>${c.modelo}<br><small style="color:var(--text-gray)">${c.color}</small></td>
                            <td>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <div class="progress-pill"><div class="progress-fill" style="width:${c.progreso}%"></div></div>
                                    <span style="font-size:11px; font-weight:700; color:var(--accent-blue)">${c.progreso}%</span>
                                </div>
                                <small style="font-size:10px; color:var(--text-gray)">${c.estatus}</small>
                            </td>
                            <td>${c.asignadoA || '---'}</td>
                            <td><small>${c.horaInicio || '--:--'}</small></td>
                            <td>
                                ${c.estatus === 'En Proceso' ? `<button class="v-btn v-btn-outline" style="padding:5px 8px; font-size:10px; color:var(--danger-red); border-color:var(--danger-red)" onclick="liberarInventario('${c.id}')">LIBERAR</button>` : '---'}
                            </td>
                        </tr>`;
                } else {
                    // TABLA HISTORIAL CON FILTRO
                    if (filtro === "HOY" && c.fecha !== hoyMexico) return;
                    
                    const duracionTotal = calcularDuracionTotal(c.horaInicio, c.horaFin);

                    historialBody.innerHTML += `
                        <tr>
                            <td><small>${c.id}</small></td>
                            <td>${c.fecha}</td>
                            <td><b>${c.modelo}</b></td>
                            <td>${c.asignadoA}</td>
                            <td><b>${duracionTotal}</b></td>
                            <td>
                                <button class="v-btn v-btn-outline" style="padding:6px 10px; font-size:11px;" onclick="descargarCSV('${c.id}')">CSV</button>
                            </td>
                            <td>
                                <button class="v-btn" style="padding:6px; background:#FFEBEB; color:var(--danger-red); border-radius:8px;" onclick="eliminarRegistroIndividual('${c.id}')">🗑️</button>
                            </td>
                        </tr>`;
                }
            });
        } catch (err) { console.error("Error en sincronización:", err); }
    }

    async function crearCiclico() {
        const modelo = document.getElementById('mod').value;
        const color = document.getElementById('col').value;
        const seleccionadas = Array.from(document.querySelectorAll('.scroll-checks input[type="checkbox"]:checked')).map(cb => cb.value);
        
        if(!modelo || !color || seleccionadas.length === 0) return alert("Por favor complete Modelo, Color y Tallas.");

        const res = await fetch('/api/crear-ciclico', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ modelo, color, tallasRaw: seleccionadas.join(', ') })
        });

        if(res.ok) {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            cargarDatos();
            alert("✅ Inventario publicado correctamente.");
        }
    }

    async function liberarInventario(folio) {
        if(confirm(`¿Desbloquear el inventario ${folio}?`)) {
            await fetch('/api/liberar-inventario', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: folio }) });
            cargarDatos();
        }
    }

    async function eliminarRegistroIndividual(folio) {
        if(!confirm(`⚠️ ¿Eliminar permanentemente el registro ${folio}?`)) return;
        const res = await fetch(`/api/eliminar-ciclico/${encodeURIComponent(folio)}`, { method: 'DELETE' });
        if(res.ok) cargarDatos();
    }

    async function eliminarTodoElHistorialMasivo() {
        if(!confirm("⚠️⚠️⚠️ ATENCIÓN: Se borrará TODO el historial finalizado de forma permanente. ¿Continuar?")) return;
        const res = await fetch('/api/eliminar-todos-finalizados', { method: 'DELETE' });
        const data = await res.json();
        alert(`Limpieza exitosa. Se borraron ${data.conteo} registros.`);
        cargarDatos();
    }

    // ==========================================
    // EXPORTACIÓN CSV PROFESIONAL (ESTILO APPLE)
    // ==========================================
    function descargarCSV(folio) {
        const item = window.datosGlobales.find(i => i.id === folio);
        if(!item) return;

        // Calculamos duración total robústa
        const duracionReporte = calcularDuracionTotal(item.horaInicio, item.horaFin);
        
        // Estructura requerida: ID, Fecha, Modelo, Color, Operador, Talla, Cantidad, Tiempo Total
        // No incluye Inicio/Fin
        let csvContent = "\uFEFFID,Fecha,Modelo,Color,Operador,Talla,Cantidad,Tiempo Total\n";
        
        item.resultados.forEach(r => {
            csvContent += `"${item.id}","${item.fecha}","${item.modelo}","${item.color}","${item.asignadoA}","${r.talla}","${r.cantidad}","${duracionReporte}"\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Reporte_${item.modelo}_${item.fecha.replace(/\//g, '-')}.csv`;
        a.click();
    }

    // IMPORTACIÓN EXCEL
    function procesarExcel(input) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const grupos = {};
            rows.forEach(r => {
                const k = `${r.Modelo}-${r.Color}`;
                if(!grupos[k]) grupos[k] = { m: r.Modelo, c: r.Color, t: [] };
                grupos[k].t.push(r.Talla);
            });
            for(let k in grupos) {
                const g = grupos[k];
                await fetch('/api/crear-ciclico', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ modelo: g.m, color: g.c, tallasRaw: g.t.join(', ') }) 
                });
            }
            alert("Excel procesado."); cargarDatos();
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    // Inicio
    cargarCatalogo(); renderTallas(); cargarDatos();
    // Actualización automática cada 10 segundos
    setInterval(cargarDatos, 10000);
</script>
