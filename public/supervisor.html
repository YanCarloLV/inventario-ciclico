<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Supervisor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; margin-top: 0; }
        
        /* Formulario */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px; align-items: end; }
        label { display: block; font-size: 13px; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; background: white; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; text-align: center; }
        .btn-add { background: #3498db; color: white; }
        .btn-refresh { background: #95a5a6; color: white; }
        .btn-dl { background: #27ae60; color: white; font-size: 12px; text-decoration: none; display: inline-block; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: #2c3e50; font-size: 14px; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .fin { background: #d4edda; color: #155724; }
        .pen { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
<div style="text-align: center; padding: 20px; background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; margin-bottom: 20px;">
    <img src="/logo.png" alt="Logo" style="max-height: 120px; width: auto; display: block; margin: 0 auto;">
    <h2 style="margin-top: 10px; color: #333;"> </h2>
</div>
<div class="container">
    <h1>📋 Gestión de Inventarios Cíclicos</h1>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h2>➕ Crear Nuevo Inventario</h2>
            <label class="btn btn-dl" style="cursor:pointer;">
                📥 Cargar desde Excel
                <input type="file" id="excelInput" accept=".xlsx, .xls" style="display:none;" onchange="procesarExcel(this)">
            </label>
        </div>
        
        <div class="form-grid">
            <div>
                <label>Modelo</label>
                <select id="mod">
                    <option value="" disabled selected>Selecciona...</option>
                    <option value="33739">33739</option>
                    <option value="4030">4030</option>
                    <option value="4040">4040</option>
                    <option value="TR-1">TR-1</option>
                    <option value="TR-2">TR-2</option>
                    <option value="C67901">C67901</option>
                    <option value="G47815">G47815</option>
                </select>
            </div>
            <div>
                <label>Color</label>
                <select id="col">
                    <option value="" disabled selected>Selecciona...</option>
                    <option value="AZUL FRANCIA">AZUL FRANCIA</option>
                    <option value="AZUL">AZUL</option>
                    <option value="NEGRO">NEGRO</option>
                    <option value="OXFORD">OXFORD</option>
                    <option value="MARINO">MARINO</option>
                    <option value="GRIS CLARO">GRIS CLARO</option>
                    <option value="R-BLUE">R-BLUE</option>
                    <option value="CAMEL">CAMEL</option>
                    <option value="BEIGE">BEIGE</option>
                    <option value="VERDE HUNTER">VERDE HUNTER</option>
                    <option value="VINO">VINO</option>
                </select>
            </div>
            <div>
                <label>Tallas (Ctrl + Click para varias)</label>
                <select id="tal" multiple style="height: 40px;">
                    <option value="36R">36R</option>
                    <option value="38R">38R</option>
                    <option value="40R">40R</option>
                    <option value="42R">42R</option>
                    <option value="44R">44R</option>
                    <option value="46R">46R</option>
                    <option value="48R">48R</option>
                    <option value="50R">50R</option>
                    <option value="52R">52R</option>
                    <option value="54R">54R</option>
                    <option value="56R">56R</option>
                    <option value="58R">58R</option>
                    <option value="60R">60R</option>
                </select>
            </div>
            <button class="btn btn-add" onclick="crearCiclico()">Guardar y Publicar</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>📊 Monitor de Actividad</h2>
            <button class="btn btn-refresh" onclick="cargarDatos()">🔄 Actualizar</button>
        </div>
        <table id="tabla">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Modelo/Color</th>
                    <th>Operador</th>
                    <th>Tiempos</th>
                    <th>Duración</th>
                    <th>Estatus</th>
                    <th>Reporte</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let datos = [];

    async function cargarDatos() {
        const res = await fetch('/api/ciclicos');
        datos = await res.json();
        const cuerpo = document.querySelector("#tabla tbody");
        cuerpo.innerHTML = "";

        datos.reverse().forEach(c => {
            cuerpo.innerHTML += `
                <tr>
                    <td><b>#${c.id}</b></td>
                    <td>${c.modelo} <br> <small style="color:gray">${c.color}</small></td>
                    <td>${c.realizadoPor || '---'}</td>
                    <td><small>In: ${c.horaInicio || '--'}<br>Fin: ${c.horaFin || '--'}</small></td>
                    <td>${c.tiempoTotal || '---'}</td>
                    <td><span class="status ${c.estatus === 'Finalizado' ? 'fin' : 'pen'}">${c.estatus}</span></td>
                    <td>
                        ${c.estatus === 'Finalizado' 
                            ? `<button class="btn btn-dl" onclick="descargarExcel(${c.id})">📥 Excel</button>` 
                            : '⌛ Esperando...'}
                    </td>
                </tr>
            `;
        });
    }

    async function crearCiclico() {
        const modelo = document.getElementById('mod').value;
        const color = document.getElementById('col').value;
        const tallasSelect = document.getElementById('tal');
        const tallasSeleccionadas = Array.from(tallasSelect.selectedOptions).map(option => option.value);

        if(!modelo || !color || tallasSeleccionadas.length === 0) return alert("Por favor llena todos los campos.");

        const tallasRaw = tallasSeleccionadas.join(', ');

        await fetch('/api/crear-ciclico', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ modelo, color, tallasRaw })
        });

        alert("¡Cíclico creado! Ya aparece en los celulares.");
        cargarDatos();
    }

    // Nueva función para procesar el Excel masivo
    function procesarExcel(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[sheetName];
            const rows = XLSX.utils.sheet_to_json(sheet);

            // Agrupamos por Modelo y Color
            const grupos = {};
            rows.forEach(row => {
                const mod = row.Modelo;
                const col = row.Color;
                const tal = row.Talla;
                
                if(mod && col && tal) {
                    const key = `${mod}-${col}`;
                    if(!grupos[key]) grupos[key] = { modelo: mod, color: col, tallas: [] };
                    grupos[key].tallas.push(tal);
                }
            });

            // Enviamos cada grupo al servidor
            for (const key in grupos) {
                const item = grupos[key];
                await fetch('/api/crear-ciclico', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        modelo: item.modelo, 
                        color: item.color, 
                        tallasRaw: item.tallas.join(', ') 
                    })
                });
            }

            alert("Excel procesado. Se han creado los inventarios correspondientes.");
            input.value = "";
            cargarDatos();
        };
        reader.readAsArrayBuffer(file);
    }

    function descargarExcel(id) {
        const c = datos.find(item => item.id === id);
        let csv = "ID,Modelo,Color,Operador,Talla,Cantidad,Inicio,Fin,Total\n";
        c.resultados.forEach(r => {
            csv += `${c.id},${c.modelo},${c.color},${c.realizadoPor},${r.talla},${r.cantidad},${c.horaInicio},${c.horaFin},${c.tiempoTotal}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Reporte_${c.modelo}_${c.id}.csv`;
        link.click();
    }

    cargarDatos();
    setInterval(cargarDatos, 30000);
</script>
</body>
</html>
