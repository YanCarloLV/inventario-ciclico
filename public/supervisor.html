<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Supervisor Pro - Actualización Crítica v2.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); margin-bottom: 25px; border-top: 5px solid #3498db; }
        .card-historial { border-top: 5px solid #95a5a6; }
        h1 { color: #2c3e50; font-size: 28px; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px; }
        h2 { font-size: 20px; color: #34495e; margin-top: 0; }
        
        /* Formulario Layout */
        .form-main { display: flex; flex-direction: column; gap: 20px; }
        .row-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #555; margin-bottom: 8px; }
        select { width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 10px; font-size: 15px; outline: none; transition: 0.3s; }
        select:focus { border-color: #3498db; }
        
        /* Tallas Grid */
        .tallas-grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 10px; }
        .talla-col { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
        .col-header { background: #f8f9fa; padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        .col-circle { width: 35px; height: 35px; background: #6c5ce7; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-weight: bold; }
        .sizes-list { max-height: 350px; overflow-y: auto; padding: 10px; }
        .size-item { display: flex; align-items: center; gap: 15px; padding: 10px; border-bottom: 1px solid #f9f9f9; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .size-item:hover { background: #f1f2f6; }
        .size-item input { transform: scale(1.3); }

        /* Botones */
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-add { background: #3498db; color: white; font-size: 16px; width: 100%; margin-top: 10px; }
        .btn-add:hover { background: #2980b9; transform: translateY(-2px); }
        .btn-refresh { background: #55efc4; color: #00b894; }
        .btn-dl { background: #27ae60; color: white; text-decoration: none; }
        .btn-danger { background: #ff7675; color: white; }
        .btn-delete-hist { background: #d63031; color: white; border-radius: 5px; padding: 6px 12px; font-size: 11px; }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background: #f8f9fa; color: #7f8c8d; text-align: left; padding: 15px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #f1f1f1; font-size: 15px; }
        .status { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .proc { background: #e3f2fd; color: #1976d2; }
        .pen { background: #fff3e0; color: #e65100; }
        
        /* Barra de Progreso */
        .prog-container { width: 120px; }
        .prog-bg { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        .prog-fill { background: #3498db; height: 100%; transition: 0.4s; }
        .prog-text { font-size: 11px; font-weight: bold; color: #3498db; margin-top: 5px; display: block; }

        /* Filtro */
        .filter-section { background: #f1f2f6; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .filter-section select { width: auto; min-width: 250px; }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 30px;">
    <img src="/logo.png" alt="Logo Empresa" style="max-height: 100px;">
</div>

        </div>

        <div class="form-main">
            <div class="row-inputs">

                    <label>Modelo del Producto</label>

                <div>
                    <label>Variante de Color</label>
                    <select id="col">
                        <option value="" disabled selected>Seleccione el color...</option>
                    </select>
                </div>
            </div>

            <label>Tallas a Inventariar:</label>
            <div class="tallas-grid-container">
                <div class="talla-col">
                    <div class="col-header">
                        <div class="col-circle">C</div>
                        <label style="font-size:12px;"><input type="checkbox" onchange="toggleGroup('C', this.checked)"> Seleccionar Todos</label>
                    </div>
                    <div id="list-C" class="sizes-list"></div>
                </div>
                <div class="talla-col">
                    <div class="col-header">
                        <div class="col-circle" style="background:#4834d4">R</div>
                        <label style="font-size:12px;"><input type="checkbox" onchange="toggleGroup('R', this.checked)"> Seleccionar Todos</label>
                    </div>
                    <div id="list-R" class="sizes-list"></div>
                </div>
                <div class="talla-col">
                    <div class="col-header">
                        <div class="col-circle" style="background:#eb4d4b">L</div>
                        <label style="font-size:12px;"><input type="checkbox" onchange="toggleGroup('L', this.checked)"> Seleccionar Todos</label>
                    </div>
                    <div id="list-L" class="sizes-list"></div>
                </div>
            </div>

            <button class="btn btn-add" onclick="crearCiclico()">✅ PUBLICAR INVENTARIO EN APP</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h2>⚡ Monitoreo en Tiempo Real</h2>
            <button class="btn btn-refresh" onclick="cargarDatos()">🔄 Refrescar Datos</button>
        </div>
        <table id="tablaActivos">
            <thead>
                <tr>
                    <th>Folio</th>
                    <th>Modelo y Color</th>
                    <th>Estado / Avance</th>
                    <th>Operador</th>
                    <th>Inicio</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card card-historial">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2>📂 Historial de Inventarios Finalizados</h2>
            <button class="btn btn-danger" onclick="eliminarTodoElHistorial()">⚠️ Borrar Todo el Historial</button>
        </div>

        <div class="filter-section">
            <label>📅 Filtro de Fecha:</label>
            <select id="filtroFecha" onchange="cargarDatos()">
                <option value="HOY">Ver solo registros de HOY (Monterrey)</option>
                <option value="TODOS">Ver registros históricos completos</option>

                    <th>Modelo/Color</th>
                    <th>Operador</th>
                    <th>Tiempo Total</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

    // --- CARGA DE SELECTORES ---
    function cargarCatalogo() {
        const modSelect = document.getElementById('mod');
        modSelect.innerHTML = '<option value="" disabled selected>Seleccione el modelo...</option>';
        const modelosUnicos = [...new Set(catalogoProductos.map(p => p.modelo))];
        modelosUnicos.sort().forEach(m => { modSelect.innerHTML += `<option value="${m}">${m}</option>`; });
    }

    function actualizarColoresSegunModelo() {
        const modeloSelected = document.getElementById('mod').value;
        const colSelect = document.getElementById('col');
        colSelect.innerHTML = '<option value="" disabled selected>Seleccione el color...</option>';
        catalogoProductos.filter(p => p.modelo === modeloSelected).forEach(p => {
            colSelect.innerHTML += `<option value="${p.color}">${p.color}</option>`;
        });
    }

    // --- RENDERIZADO DE TALLAS ---
    const tallasBase = [36, 38, 40, 42, 44, 46, 48, 50, 52, 54, 56, 58, 60, 62, 64];
    function renderTallas() {
        ['C', 'R', 'L'].forEach(cat => {
            document.getElementById(`list-${cat}`).innerHTML = tallasBase.map(t => `
                <label class="size-item">
                    <input type="checkbox" class="check-${cat}" value="${t}${cat}"> 
                    <span>${t}${cat}</span>

    function toggleGroup(cat, isChecked) {
        document.querySelectorAll(`.check-${cat}`).forEach(cb => cb.checked = isChecked);

    // ==========================================
    // NORMALIZACIÓN DE FECHAS Y TIEMPOS (ROBUSTO)
    // ==========================================
    
    // Función para que la fecha siempre sea DD/MM/YYYY sin importar el navegador
    function obtenerFechaHoyMonterrey() {
        const d = new Date();
        const dia = d.toLocaleDateString('es-MX', {timeZone: 'America/Monterrey', day: '2-digit'});
        const mes = d.toLocaleDateString('es-MX', {timeZone: 'America/Monterrey', month: '2-digit'});
        const anio = d.toLocaleDateString('es-MX', {timeZone: 'America/Monterrey', year: 'numeric'});
        return `${dia}/${mes}/${anio}`;
    }

    function calcularDiferenciaTiempo(inicio, fin) {
        if (!inicio || !fin) return "00:00:00";
        try {
            const parsear = (str) => {
                const [time, mod] = str.split(' ');
                let [h, m, s] = time.split(':');
                if (h === '12') h = '00';
                if (mod === 'PM') h = parseInt(h, 10) + 12;
                const d = new Date();
                d.setHours(h, m, s, 0);
                return d.getTime();
            };
            let diff = parsear(fin) - parsear(inicio);
            if (diff < 0) diff += 86400000; // Caso cruce de medianoche
            const segs = Math.floor(diff / 1000);
            return new Date(segs * 1000).toISOString().substr(11, 8);
        } catch (e) { return "---"; }
    }

    // ==========================================
    // GESTIÓN DE DATOS (CRUD Y FILTROS)
    // ==========================================

    async function cargarDatos() {
        try {
            const res = await fetch('/api/ciclicos');
            const listado = await res.json();
            
            const filtro = document.getElementById('filtroFecha').value;
            const hoyRef = obtenerFechaHoyMonterrey();

            const activosBody = document.querySelector("#tablaActivos tbody");
            const historialBody = document.querySelector("#tablaHistorial tbody");
            activosBody.innerHTML = ""; historialBody.innerHTML = "";

            // Guardamos en global para descargar CSV
            window.datosGlobales = listado;

            listado.forEach(c => {
                if (c.estatus !== 'Finalizado') {
                    // Render Activos
                    activosBody.innerHTML += `
                        <tr>
                            <td><b>${c.id}</b></td>
                            <td>${c.modelo}<br><small>${c.color}</small></td>
                            <td>
                                <span class="status ${c.estatus === 'En Proceso' ? 'proc' : 'pen'}">${c.estatus}</span>
                                ${c.estatus === 'En Proceso' ? `
                                    <div class="prog-container">
                                        <div class="prog-bg"><div class="prog-fill" style="width:${c.progreso}%"></div></div>
                                        <span class="prog-text">${c.progreso}% completado</span>
                                    </div>` : ''}
                            </td>
                            <td>${c.asignadoA || 'Sin asignar'}</td>
                            <td><small>${c.horaInicio || '--:--'}</small></td>
                            <td>
                                ${c.estatus === 'En Proceso' ? `<button class="btn-danger" style="padding:5px;" onclick="liberarInventario('${c.id}')">🔓 Liberar</button>` : '---'}
                            </td>
                        </tr>`;
                } else {
                    // Filtro de Historial
                    if (filtro === "HOY" && c.fecha !== hoyRef) return;

                    const tTotal = calcularDiferenciaTiempo(c.horaInicio, c.horaFin);

                    historialBody.innerHTML += `
                        <tr>
                            <td><small>${c.id}</small></td>
                            <td>${c.fecha}</td>
                            <td>${c.modelo} - ${c.color}</td>
                            <td>${c.asignadoA}</td>
                            <td><b>${tTotal}</b></td>
                            <td>
                                <button class="btn btn-dl" style="padding:5px 10px;" onclick="descargarCSV('${c.id}')">📥 CSV</button>
                                <button class="btn-delete-hist" onclick="eliminarFila('${c.id}')">🗑️</button>
                            </td>
                        </tr>`;
                }
            });
        } catch (err) { console.error("Error cargando tabla:", err); }
    }

    async function crearCiclico() {
        const modelo = document.getElementById('mod').value;
        const color = document.getElementById('col').value;
        const seleccionadas = Array.from(document.querySelectorAll('.sizes-list input[type="checkbox"]:checked')).map(cb => cb.value);
        
        if(!modelo || !color || seleccionadas.length === 0) {
            alert("⚠️ Por favor completa Modelo, Color y al menos una Talla.");
            return;
        }
        
        const res = await fetch('/api/crear-ciclico', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ modelo, color, tallasRaw: seleccionadas.join(', ') })
        });
        
        if(res.ok) { 
            // Limpiar checks
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            cargarDatos();
            alert("✅ Inventario publicado correctamente.");
        }
    }

    async function liberarInventario(id) {
        if(confirm("¿Deseas desbloquear este inventario para que otro operador pueda tomarlo?")) {
            await fetch('/api/liberar-inventario', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ id }) 
            });
            cargarDatos();
        }
    }

    async function eliminarFila(id) {
        if(!confirm(`¿Eliminar definitivamente el registro ${id}?`)) return;
        await fetch(`/api/eliminar-ciclico/${encodeURIComponent(id)}`, { method: 'DELETE' });
        cargarDatos();
    }

    async function eliminarTodoElHistorial() {
        if(!confirm("⚠️ ATENCIÓN: Se borrarán TODOS los registros finalizados de la base de datos. ¿Continuar?")) return;
        const res = await fetch('/api/eliminar-todos-finalizados', { method: 'DELETE' });
        const data = await res.json();
        alert(`Limpieza exitosa. Se borraron ${data.conteo} registros.`);
        cargarDatos();
    }

    // ==========================================

    // ==========================================
    function descargarCSV(folio) {
        console.log("Intentando descargar folio:", folio);
        const item = window.datosGlobales.find(i => i.id === folio);
        
        if(!item) {
            alert("Error: No se encontró la información del inventario.");
            return;
        }

        const tFinal = calcularDiferenciaTiempo(item.horaInicio, item.horaFin);
        
        // Encabezados según requerimiento: ID, Fecha, Modelo, Color, Operador, Talla, Cantidad, Tiempo Total
        let contenidoCsv = "\uFEFFID,Fecha,Modelo,Color,Operador,Talla,Cantidad,Tiempo Total\n";
        
        item.resultados.forEach(r => {
            contenidoCsv += `"${item.id}","${item.fecha}","${item.modelo}","${item.color}","${item.asignadoA}","${r.talla}","${r.cantidad}","${tFinal}"\n`;
        });

        const blob = new Blob([contenidoCsv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Reporte_Ciclico_${item.modelo}_${item.fecha.replace(/\//g, '-')}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function procesarExcel(input) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const grupos = {};
            rows.forEach(r => {
                const k = `${r.Modelo}-${r.Color}`;
                if(!grupos[k]) grupos[k] = { m: r.Modelo, c: r.Color, t: [] };
                grupos[k].t.push(r.Talla);
            });
            for(let k in grupos) {
                const g = grupos[k];
                await fetch('/api/crear-ciclico', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ modelo: g.m, color: g.c, tallasRaw: g.t.join(', ') }) 
                });
            }
            alert("Excel procesado con éxito."); 
            cargarDatos();
        };
        reader.readAsArrayBuffer(input.files[0]);
    }

    // Inicio de sistema
    cargarCatalogo(); 
    renderTallas(); 
    cargarDatos();
    
    // Auto-actualización cada 8 segundos
    setInterval(cargarDatos, 8000);
</script>
</body>
