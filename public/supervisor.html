<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Supervisor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1, h2 { color: #2c3e50; margin-top: 0; }
        
        /* Formulario Layout */
        .form-main { display: flex; flex-direction: column; gap: 20px; }
        .row-inputs { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: end; }
        
        label { display: block; font-size: 13px; font-weight: bold; color: #7f8c8d; margin-bottom: 8px; }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: white; font-size: 14px; }
        
        /* Diseño de Tallas (Chips como el ejemplo) */
        .tallas-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid #eee;
        }
        .size-chip {
            padding: 10px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            color: #555;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            user-select: none;
            text-align: center;
            min-width: 50px;
        }
        .size-chip:hover { border-color: #3498db; color: #3498db; }
        .size-chip.selected {
            border-color: #3498db;
            background-color: #ebf5fb;
            color: #3498db;
            box-shadow: 0 2px 5px rgba(52, 152, 219, 0.2);
        }

        /* Botones */
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; text-align: center; }
        .btn-add { background: #3498db; color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-refresh { background: #95a5a6; color: white; }
        .btn-dl { background: #27ae60; color: white; font-size: 12px; text-decoration: none; display: inline-block; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; color: #2c3e50; font-size: 14px; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .fin { background: #d4edda; color: #155724; }
        .pen { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div style="text-align: center; padding: 20px; background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; margin-bottom: 20px;">
    <img src="/logo.png" alt="Logo" style="max-height: 120px; width: auto; display: block; margin: 0 auto;">
</div>

<div class="container">
    <h1>📋 Gestión de Inventarios Cíclicos</h1>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <h2>➕ Crear Nuevo Inventario</h2>
            <label class="btn btn-dl" style="cursor:pointer;">
                📥 Cargar desde Excel
                <input type="file" id="excelInput" accept=".xlsx, .xls" style="display:none;" onchange="procesarExcel(this)">
            </label>
        </div>
        
        <div class="form-main">
            <div class="row-inputs">
                <div>
                    <label>Modelo</label>
                    <select id="mod">
                        <option value="" disabled selected>Selecciona modelo...</option>
                        <option value="33739">33739</option>
                        <option value="4030">4030</option>
                        <option value="4040">4040</option>
                        <option value="TR-1">TR-1</option>
                        <option value="TR-2">TR-2</option>
                        <option value="C67901">C67901</option>
                        <option value="G47815">G47815</option>
                    </select>
                </div>
                <div>
                    <label>Color</label>
                    <select id="col">
                        <option value="" disabled selected>Selecciona color...</option>
                        <option value="AZUL FRANCIA">AZUL FRANCIA</option>
                        <option value="AZUL">AZUL</option>
                        <option value="NEGRO">NEGRO</option>
                        <option value="OXFORD">OXFORD</option>
                        <option value="MARINO">MARINO</option>
                        <option value="GRIS CLARO">GRIS CLARO</option>
                        <option value="R-BLUE">R-BLUE</option>
                        <option value="CAMEL">CAMEL</option>
                        <option value="BEIGE">BEIGE</option>
                        <option value="VERDE HUNTER">VERDE HUNTER</option>
                        <option value="VINO">VINO</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Elige las tallas a inventariar:</label>
                <div id="tallas-grid" class="tallas-container">
                    </div>
            </div>

            <button class="btn btn-add" onclick="crearCiclico()">🚀 Guardar y Publicar Inventario</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>📊 Monitor de Actividad</h2>
            <button class="btn btn-refresh" onclick="cargarDatos()">🔄 Actualizar</button>
        </div>
        <table id="tabla">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Modelo/Color</th>
                    <th>Operador</th>
                    <th>Tiempos</th>
                    <th>Duración</th>
                    <th>Estatus</th>
                    <th>Reporte</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let datos = [];
    const listaTallas = [
        "36R", "38R", "40R", "42R", "44R", "46R", "48R", "50R", "52R", "54R", "56R", "58R", "60R",
        "36C", "38C", "40C", "42C", "44C", "46C", "48C", "50C", "52C", "54C", "56C", "58C", "60C",
        "404"
    ];

    // Generar los botones de tallas al cargar
    function renderTallas() {
        const grid = document.getElementById('tallas-grid');
        grid.innerHTML = listaTallas.map(t => `
            <div class="size-chip" onclick="toggleTalla(this, '${t}')">${t}</div>
        `).join('');
    }

    function toggleTalla(elemento, talla) {
        elemento.classList.toggle('selected');
    }

    async function cargarDatos() {
        const res = await fetch('/api/ciclicos');
        datos = await res.json();
        const cuerpo = document.querySelector("#tabla tbody");
        cuerpo.innerHTML = "";

        datos.reverse().forEach(c => {
            cuerpo.innerHTML += `
                <tr>
                    <td><b>#${c.id}</b></td>
                    <td>${c.modelo} <br> <small style="color:gray">${c.color}</small></td>
                    <td>${c.realizadoPor || '---'}</td>
                    <td><small>In: ${c.horaInicio || '--'}<br>Fin: ${c.horaFin || '--'}</small></td>
                    <td>${c.tiempoTotal || '---'}</td>
                    <td><span class="status ${c.estatus === 'Finalizado' ? 'fin' : 'pen'}">${c.estatus}</span></td>
                    <td>
                        ${c.estatus === 'Finalizado' 
                            ? `<button class="btn btn-dl" onclick="descargarExcel(${c.id})">📥 Excel</button>` 
                            : '⌛ Esperando...'}
                    </td>
                </tr>
            `;
        });
    }

    async function crearCiclico() {
        const modelo = document.getElementById('mod').value;
        const color = document.getElementById('col').value;
        
        // Obtener tallas de los chips seleccionados
        const seleccionadas = Array.from(document.querySelectorAll('.size-chip.selected'))
                                   .map(chip => chip.innerText);

        if(!modelo || !color || seleccionadas.length === 0) {
            return alert("Por favor selecciona modelo, color y al menos una talla.");
        }

        const tallasRaw = seleccionadas.join(', ');

        await fetch('/api/crear-ciclico', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ modelo, color, tallasRaw })
        });

        alert("¡Cíclico creado exitosamente!");
        
        // Limpiar formulario
        document.getElementById('mod').selectedIndex = 0;
        document.getElementById('col').selectedIndex = 0;
        document.querySelectorAll('.size-chip').forEach(c => c.classList.remove('selected'));
        
        cargarDatos();
    }

    function procesarExcel(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);

            const grupos = {};
            rows.forEach(row => {
                const mod = row.Modelo;
                const col = row.Color;
                const tal = row.Talla;
                if(mod && col && tal) {
                    const key = `${mod}-${col}`;
                    if(!grupos[key]) grupos[key] = { modelo: mod, color: col, tallas: [] };
                    grupos[key].tallas.push(tal);
                }
            });

            for (const key in grupos) {
                const item = grupos[key];
                await fetch('/api/crear-ciclico', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        modelo: item.modelo, 
                        color: item.color, 
                        tallasRaw: item.tallas.join(', ') 
                    })
                });
            }

            alert("Excel procesado correctamente.");
            input.value = "";
            cargarDatos();
        };
        reader.readAsArrayBuffer(file);
    }

    function descargarExcel(id) {
        const c = datos.find(item => item.id === id);
        let csv = "ID,Modelo,Color,Operador,Talla,Cantidad,Inicio,Fin,Total\n";
        c.resultados.forEach(r => {
            csv += `${c.id},${c.modelo},${c.color},${c.realizadoPor},${r.talla},${r.cantidad},${c.horaInicio},${c.horaFin},${c.tiempoTotal}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Reporte_${c.modelo}_${c.id}.csv`;
        link.click();
    }

    // Inicialización
    renderTallas();
    cargarDatos();
    setInterval(cargarDatos, 30000);
</script>
</body>
</html>
