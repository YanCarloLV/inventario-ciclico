<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura Libre de Almacén</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .form-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .full-width { grid-column: span 2; }
        .btn-add { background: #3498db; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; background: white; font-size: 12px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #2c3e50; color: white; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="form-card">
        <h3>📝 Nueva Fila (Hallazgo)</h3>
        <div class="grid-inputs">
            <input type="text" id="f-marca" placeholder="Marca (Ej: Carlos Lusso)" list="l-marcas" class="full-width">
            <input type="text" id="f-tipo" placeholder="Tipo (Ej: Traje/Saco)" list="l-tipos">
            <input type="text" id="f-color" placeholder="Color" list="l-colores">
            <input type="text" id="f-modelo" placeholder="Modelo" class="full-width">
            <input type="text" id="f-talla" placeholder="Talla">
            <input type="number" id="f-qty" placeholder="Cant.">
        </div>
        <button class="btn-add" onclick="agregarFila()">➕ Añadir a la lista</button>
    </div>

    <div class="form-card" style="padding: 10px; overflow-x: auto;">
        <table id="tabla-hallazgos">
            <thead>
                <tr>
                    <th>Marca</th>
                    <th>Modelo</th>
                    <th>Talla</th>
                    <th>Cant.</th>
                    <th>E</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button class="btn-save" onclick="enviarAlServidor()">🚀 Guardar Todo e Ir al Reporte</button>
        <button onclick="location.href='supervisor.html'" style="width:100%; border:none; background:none; color:gray; margin-top:10px; cursor:pointer;">Regresar</button>
    </div>

    <datalist id="l-marcas"><option value="Carlos Lusso"><option value="Giorgio Fiorelli"><option value="Lusso"></datalist>
    <datalist id="l-tipos"><option value="Traje"><option value="Saco"><option value="Pantalon"><option value="Chaleco"></datalist>

    <script>
        let filas = [];
        let operador = localStorage.getItem('operador_nombre') || "Admin";

        function agregarFila() {
            const row = {
                marca: document.getElementById('f-marca').value,
                tipo: document.getElementById('f-tipo').value,
                color: document.getElementById('f-color').value,
                modelo: document.getElementById('f-modelo').value,
                talla: document.getElementById('f-talla').value,
                cantidad: document.getElementById('f-qty').value
            };

            if(!row.modelo || !row.cantidad) return alert("Modelo y Cantidad son obligatorios");

            filas.push(row);
            actualizarTabla();
            
            // Limpiar y enfocar para rapidez
            document.getElementById('f-modelo').value = "";
            document.getElementById('f-talla').value = "";
            document.getElementById('f-qty').value = "";
            document.getElementById('f-marca').focus(); 
        }

        function actualizarTabla() {
            const tbody = document.querySelector("#tabla-hallazgos tbody");
            tbody.innerHTML = filas.map((f, i) => `
                <tr>
                    <td>${f.marca}</td>
                    <td>${f.modelo}</td>
                    <td>${f.talla}</td>
                    <td>${f.cantidad}</td>
                    <td><button onclick="filas.splice(${i},1); actualizarTabla();" style="border:none; background:none; color:red;">X</button></td>
                </tr>
            `).join('');
        }

        async function enviarAlServidor() {
            if(filas.length === 0) return alert("La lista está vacía");

            // Creamos un formato que el server entienda como un cíclico finalizado
            const hallazgo = {
                modelo: "HALLAZGO LIBRE",
                color: "VARIOS",
                tallas: filas.map(f => f.talla),
                resultados: filas.map(f => ({ talla: f.talla, cantidad: f.cantidad, infoExtra: `${f.marca} ${f.tipo} ${f.color}` })),
                asignadoA: operador,
                estatus: "Finalizado",
                totalTallas: filas.length,
                horaInicio: new Date().toLocaleTimeString(),
                horaFin: new Date().toLocaleTimeString()
            };

            const res = await fetch('/api/crear-ciclico', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(hallazgo)
            });

            if(res.ok) {
                alert("¡Guardado! El supervisor ya puede ver este reporte en el historial.");
                location.href = 'supervisor.html';
            }
        }
    </script>
</body>
</html>
